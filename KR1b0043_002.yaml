body:
  text: 尚書疏衍卷二眀陳第撰曰若稽古帝堯曰放勳按孔傳若順稽考也能順考古道而行之者帝堯此其意似迂而不逹嘗考曰粵越三字古通用蔡注曰若者發語辭史臣將叙堯事故先言考古之帝堯此解是也然孔蔡皆謂放勳非堯之名故重華文命亦謂非舜禹之名愚考之五帝德堯髙辛之子也曰放勳其仁如天其知如神舜蟜牛之孫瞽瞍之子也曰重華好學孝友聞于四海禹髙陽之孫鯀之子也曰文命敏給克濟其德不回此其說至眀眀也經之義疏無以加此孟子稱放勳命契放勳乃殂落史記述本紀世表以至馬融鄭𤣥皇甫謐諸人未嘗異也夫堯舜禹湯豈非古今之通稱乎湯名履實見論語堯舜禹可知矣蘇子瞻曰以文命為禹名則布于四海者何事耶夏書云禹敷土隨山刋木商頌云禹敷下土方則弼成五服任土任貢何者非禹之所敷也分命羲仲按厯書之作始于黃帝黃帝考星厯立五行正閠餘於是有天地神祗物類之官是謂五官各司其序不相亂也故堯命治厯慎重其事上言厯象日月星辰敬授人時論其統體也推驗考測必極其精杪曶有差則躔度不應矣故分遣四子各居其方察日之出入農之作息昏曉之中星四時之節氣以至人之祁寒暑雨物之毛羽生落離合參伍毫髮不爽斯厯元可定矣苟不置閏則氣朔盈虛終莫齊一故曰以閠月定四時成嵗也總之皆治厯眀時之事厯成則隂陽順風雨時百穀登而協氣暢百工有不釐庶績有不熙乎是經文次序最眀且悉蔡注於厯象日月便謂作厯已成於分命則云此下四節言厯既成而分職以頒布且考驗之恐其推步之或差夫分職頒布云者豈以羲仲頒春厯羲叔頒夏厯和仲和叔頒秋冬厯乎何其錯雜而不一也其考驗之恐錯云者豈以四子考春夏秋冬之或差則識之以修改乎何其測候之後時也至下文平秩東作又云以厯之節氣早晚均次其先後之宜以授有司何其頒布之不豫也近世周堯弼名洪謨蜀人非之似矣然堯弼以為使四子者考驗已頒之厯為編次將來之厯則亦稽之未審也傳曰履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖此三者治厯一時事也闕一不可以為厯噫厯法難矣起于黃帝明于唐虞遵用于夏商至周襄王之世閠且失矣漢武起而更定之自太初訖元鳯三十嵗而是非莫定女于時觀厥刑于二女按堯之妻舜在克諧以孝之後象之化誨久矣安至殺舜為事而欲室其二嫂乎故齊東野人之語皆不足辨也愚讀封禪書武帝好神仙燕齊言怪誕者不可殫紀戰國道喪人好造言若大浸滔天茫無津岸舜所以堲讒說殄行也又史記帝紀黃帝生𤣥囂𤣥囂生蟜極蟜極生帝嚳帝嚳生放勳是為帝堯黃帝又生昌意昌意生顓頊顓頊生窮蟬窮蟬生敬康敬康生句望句望生橋牛橋牛生瞽瞍瞽瞍生重華是為帝舜則堯之二女乃舜之從曽祖姑也豈可以通婚媾乎故經有眀文帝紀之世次不足信矣莊子曰六合之外聖人存而不論豈惟六合之外唐虞以上存之可也納于大麓烈風雷雨弗迷按孔叢子宰我問書納于大麓烈風雷雨弗迷何謂也孔子曰此言人事之應乎天也堯既得舜歷試諸艱已而納之于尊顯之官使大録萬機之政是故隂陽清和五星不悖烈風雷雨各以其應不有迷錯愆伏眀舜之行合乎天也孔安國主此說孔頴逹曰麓聲近録此與上三事亦同時也上為變人此為動天故最後言之以為成功之驗史記曰堯使舜入山林川澤暴風雷雨舜行不迷蔡蘇氏皆主此說蘇且以是為受命之祥也愚謂上古用字惟取同音不似後世之按字分義故以麓為録義自可通如必泥其字馬鄭云麓足也納于大山之足而風雨不迷似亦無足怪者故孔叢子之說意似滋長禋于六宗六宗之說自漢以來紛然矣祭法曰埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜眀祭月也幽宗祭星也雩宗祭水旱也孔叢子載宰我問答與此同故孔安國王肅孔頴逹蘇子瞻蔡仲默皆主是說意近之矣或疑水旱寒暑乃祈禱之祭非有當于攝位之事也鄭𤣥則謂星辰司中司命風師雨師星五緯也辰日月所㑹十二次也司中司命文昌第五第四星也風師箕也雨師畢也按周官大宗伯以實柴祀日月星辰以槱燎祀司中司命風師雨師今以周禮解虞書恐未必其合也况去日月獨數星辰以下為六可乎歐陽大小夏侯皆云所祭者六上不謂天下不謂地旁不謂四方在六者之間助隂陽變化實一而名六宗矣孔光劉歆以六宗為乾坤六子水火風雨山澤也賈逵以為六宗天宗三日月星辰地宗三河海岱也馬融云萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏此其謂六宗張髦以為三昭三穆司馬彪謂天宗者日月星辰寒暑之屬地宗社稷五祀之屬四方之宗四時五帝之屬劉邵謂萬物負隂而抱陽冲氣以為和六宗者太極冲和之氣為六宗之氣也張迪以為六代帝王杜佑以為昊天上帝與五帝為六近代周堯弼力駁諸家而以時也日也月也星辰也社稷也宗廟也為六宗噫何其雜擾而不一也孰是孰非不能起虞史于地下而質之姑從祭法之言可也闕之亦可也輯五瑞愚謂理道可千載而互思制度不可異時而懸斷孔子曰多聞闕疑吾猶及史之闕文也旨哉言矣故五瑞五禮五玉三帛二生一死五器之類虞書未嘗悉數其目也漢儒悉以周制當之雖其意不逺而其事則非故禮曰鸞車有虞氏之路也鉤車夏后氏之路也大路殷路也乘路周路也有虞氏之旗夏后氏之綏殷之大白周之大赤泰有虞氏之尊也山罍夏后氏之尊也著殷尊也犧象周尊也有虞氏瓦棺夏后氏堲周殷人棺椁周人牆置翣又曰五帝殊時不相沿樂三王異世不相襲禮又曰聖人南面而治天下必自人道始矣立權度量考文章改正朔易服色殊徽號異器械别衣服此其所得與民變革者也其不可得變革者則有矣親親也尊尊也長長也男女有别也此其不可得與民變革者也剖判古今臚列度數亦云辨矣今解經者于五瑞則曰公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧據周禮典瑞之文也于五禮則曰吉凶軍賓嘉據周禮宗伯之文也于三帛則曰諸侯世子執纁公之孤執𤣥附庸之君執黃據周禮典命之文而增其帛之色也二生一死則曰卿執羔大夫執鴈士執雉據周禮六摯之文而去其孤執皮帛庶人執鶩工商執雞也是言周制則備而于虞書豈其持符節合乎且虞之職官有百揆有四嶽有司空有后稷有司徒有士有工有虞有秩宗有典樂有納言外有十二牧與周之六卿分職各率其屬者不同也况于禮樂制度乎然則必何如而後可曰存狐疑之意于稽古之中五瑞則曰若周禮公執桓圭等之數五禮則曰若周禮吉凶軍賓嘉之類是能達乎四代所以異同而傳信傳疑庶其是矣然此猶就周禮可據者言之也若五玉所以為贄五器所以行禮似與五瑞不同今解者曰五玉即五瑞五器即五玉夫瑞者天子之命圭諸侯所世守前既輯而班之矣又名之為玉為器不幾于復乎周禮以玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方虞制未必同也愚謂讀虞書者在得其君臣之精神所以運量民物而鼓舞元化者可貴也若夫器數之類知之無能為益不知無能為損闕之可矣詩曰我思古人實獲我心如五器卒乃復孔頴逹曰如若也言諸侯贄之內若是五器禮終乃還之如三帛生死則不還也此蓋惑于班瑞而附㑹其說不知贄者所以通于上下交際之禮也恐其不齊故如之如者同之也曰同律度量衡曰修五禮曰如五器義正相類蔡注曰卒乃復者舉祀禮覲諸侯一正朔同制度修五禮如五器數事皆畢則不復東行而遂西向且轉而南行也此解甚當無容喙矣象以典刑虞書五刑漢孔安國馬融鄭𤣥魏王肅唐孔頴逹宋蔡仲默皆以墨劓剕宫大辟當之愚竊以為不然夫以至德禪讓之際時雍風動之時乃制肉刑以待天下豈理也哉故怙終賊刑殺也降此則有流有鞭有朴有贖是以四凶之罪流之放之竄之殛之庶頑讒說撻之書之此其彰彰懸象若日月也肉刑之設不知所起吕刑云苗民弗用靈爰始淫為劓刵椓黥至周禮司刑掌五刑之法以麗萬民之罪於是墨劓刖宫殺之文始明徴可考周之盛時刑措不用有五聲聽之八議寬之太和元氣未始不洋詡于宇宙間也漢文帝深傷夫死者不可復生刑者不可復續於是遂除肉刑千古之至仁也惟黥劓刖雖除而宫刑尚在是以史遷之賢不得全肢體于世君子悲之矣雖然刑以弼教間邪息暴亂也古之聖人兢兢然不敢以意重之以傷民命亦不敢以意輕之以失姦宄漢文帝詔云有虞氏之時畫衣冠異章服以為戮而民弗犯此亦形容其從欲之治云爾乃儒者矯為之說曰五帝畫衣冠而民知禁犯墨者皂其巾犯劓者丹其服犯臏者墨其體犯宫者雜其屨大辟之罪布其衣𥚑而無顔緣此其言之過也丹朱親帝堯子而且傲虐朋淫豈以有虞氏之世無一丹朱乎畫衣服足以警之乎四凶之罪亦可屏流殛而弗庸乎臯陶曰宥過無大刑故無小中正之軌也然則明于五刑以何者為五乎曰鞭朴贖流殺意亦似之未可知也然而斷非肉刑可知也夫肉刑不作于堯舜之世也遏絶苗民無世在下所以懲奸禁暴使天下日遷善逺罪而不知為之者故曰後有作者弗可及已愚讀揚子雲法言曰唐虞象刑惟明夏后肉辟三千漢書刑法志曰禹承堯舜之後自以德衰而制肉刑湯武順而用之者以俗薄于唐虞故也由此觀之其作于禹乎然禹親見唐虞之治固祇德以先天下者豈忍為此斷肢體絶嗣𦙍之刑也法言漢志不足盡信漢武䇿制曰殷人執五刑以督教傷肌膚以懲惡考之六經罔有的據惟伊訓臣下不匡其刑墨墨似五刑之一解者引叔向之言曰貪以敗官為墨昏墨賊殺臯陶之刑也然則禹湯之盛其猶用堯舜之遺乎叔向又曰夏有亂政而作禹刑商有亂政而作湯刑意者起于夏商之季世而周官采之耶夫聖人制刑所以懲惡惡而能改復為全人乃敗壞其四體毁裂其面目而斷絶其生生使不得遺育于後世雖欲改過自新其道何由故緹縈之語今古之至悲也逮至隋唐創法定制以笞杖徒流死為五刑至今用之不廢此與唐虞之流竄鞭朴何以異乎嗟夫以漢之賢人君子不能言而女子實言之殆天啓其𠂻以造萬世之民命非偶然也詩曰先民有言詢于芻蕘諒哉諒哉五刑有服服者刑當而服罪也五服三就易曰革言三就如後世讞獄覆審之類蓋其慎也孔氏謂大罪于原野大夫於朝士於市實本魯語之文然大罪原野者征討之兵似不可列之於刑也五流者流雖五刑之一而其目有五如四凶之罪或以靜言庸違流或以黨比象恭流或以昏迷逆命流或以績用弗成流今其詳不可知矣三居者孔子謂大罪四裔次九州之外次千里之外意亦近之禹貢于荒服曰二百里流或於荒服而分為三居亦未可定也陟方乃死舊說謂舜陟方嶽死于蒼梧之野而葬焉檀弓曰舜葬于蒼梧之野魯語曰舜勤事而野死是也蘇子瞻引韓昌黎之說曰地傾東南巡非陟也陟方者猶曰升遐爾書曰惟新陟王是也傳書者以乃死為陟方之訓蓋其章句而後之學者誤以為經文也蔡注云陟方乃死猶言殂落而死也既曰殂落又曰而死不幾于贅乎蘇氏直以乃死為釋文君子亦未敢以為然也或疑舜既倦勤命禹居攝則巡狩之事禹事也何舜以垂殁之年而逺陟蠻夷之徼乎孟子稱舜卒于鳴條鳴條蒲坂接境當不誣矣然愚考零陵九疑實有舜冢秦始皇三十七年十一月至雲夢望祀虞舜于九疑山後世帝王祭告恆必于是則舜冢非無也冢既非無則野死非妄也野死非妄則陟方非誣也經云東巡守至于岱宗南巡西巡北巡至于南西北嶽陟之為義云胡不可太甲曰若陟遐必自邇總之舊說近是而紛紛之疑皆蛇足矣舜生三十鄭𤣥讀舜生三十句徵庸三十句在位五十載句蘇東坡從此讀念茲在兹念兹在茲四句舊說皆謂禹勸帝念臯陶念臯陶何必若是其義淺矣此正言臯陶之邁種德也夫種者滋殖之義邁者黽勉之意農夫之種也豈惟春耕夏耘而秋收哉朝夕廑思出作入息無敢鹵莾滅裂故能成厥功臯陶司刑刑者民命所關故臯陶念時此事不念時亦此事言時此事不言而信發於心亦此事所以廣好生之德而深入於民心是之謂邁種黎民所以懷也其功卓矣故始帝曰念哉終曰惟帝念功左傳邾庶其以二邑來奔季孫以公姑姊妻之皆有賜于從者於是魯多盜臧武仲不能詰也其復於季孫曰紇也聞之在上位者灑濯其心一以待人軌度其信可明徴也而後可以治人夏書曰念兹在兹釋兹在兹名言兹在兹允出兹在茲惟帝念功將謂由已一也信由已一而後功可念也其此章之訓詁也歟明于五刑以弼五教孟子曰使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信此自天地剖判以來聖人教天下不可得而變革者也民不率教則繩之以刑於是有不親不義不别不序不信之刑教之所服刑之所去也教之所悖刑之所施也故教行則刑益省刑立則教益彰家語曰雖有不孝弒上之獄而無陷刑之民雖有淫亂變聞之獄而無陷刑之民雖有姦邪賊盜靡法妄行之獄而無陷刑之民是之謂至德至治之世也故讀唐虞之書若登春臺之上熙然翔風洽藹然協氣流負罪引慝舜之事父母處兄弟自他人視之若無罪慝然者此不知孝道之難與大舜之心也夫家人骨肉之間安忍論是非可否故舜不得于親惴惴然真以為罪真以為慝由中心逹于面目若見己之當刑當誅投豺虎而父母非厲磔四體而父母非刻者故服田力穡之間不覺涕泣之橫集呼號之慘戚也孟子曰人悅之好色富貴無足以解憂者惟順于父母可以解憂揚子雲曰事父母自知不足矣其舜乎二子知舜之心矣是心也於動天地格鬼神孚臣民感蠻貊何有嗟夫當軍旅之間而談祗父之事舍攻戰之法而拜至誠之言此唐虞至德之妙用非叔世所能識也曰若稽古臯陶曰允迪厥德謨眀弼諧或問放勳重華文命既為堯舜禹之名則此允迪亦為臯陶之名乎曰堯舜禹之名有帝德帝繫可考據也故稽堯曰放勳下即序堯德舜禹亦然詞至順矣然史固有詞同而實異者不可一例齊之何者不必出于一人之手也蔡注稽古臯陶言曰允迪厥德謨眀弼諧禹曰俞如何詞亦似順若作稽古臯陶名曰允迪下叙其德所謀者眀所弼者諧堯舜禹之例義無不可但臯陶未有言禹曰俞又誰乎然蘇子瞻疑弼諧之下必有闕文是亦一說也或問曰若為發語詞於何證之曰越若來見召誥亦行有九德亦言其人有德乃言曰載采采夫民之不安自官邪也官之失德無以擇之也以九德擇之則不失人矣故臯陶因禹之問答之以人之所行原有九德為治者亦言其人有何德乃可曰任事事九德下文歷數之矣亦言其人有德即日宣日嚴翕受敷施之意載采采即浚眀有家亮采有邦庶績其凝之意蘇曰論其人則曰斯人也有某德言其德則曰是德也有某事蔡亦本之意似迂逺日宣三德人難于全德用難于求備故九德之中得有三人者宣逹之可以治家得有六人者尊嚴敬用之可以治國得有九人者合受而布之可以治天下故日宣日嚴正與翕受敷施相應得人有多寡則治效有逺近此陳謨之意為官人設也蔡傳曰九德有其三尤必日宣而充廣之而使之益以著九德有其六尤必日嚴而祗敬之而使之益以謹則似乎修德之事矣豫乘四載孔傳謂水乘舟陸乘車泥乘輴山乘樏後儒皆從之舟車不易可矣輴史記夏本紀作橇河渠書作毳漢書溝洫志亦作毳尸子作蕝實一物也孟康曰橇形如箕擲行泥上張守節又詳解之曰橇形如船而短小兩頭微起人曲一腳泥上擲進用拾泥上之物孟張之解既得其形又得其用今閩越海濵皆有之泥行之具必不可易者也如淳謂以板置泥上以通行路夫置板以行泥此拙滯之法不可以變通轉移彼蓋未至海濵而覩所謂橇特以意度之而已耳樏史記夏本紀作檋河渠書作橋漢書溝洫志作梮實一物也如淳曰梮謂以鐵如錐頭長半寸施之履下不蹉跌也蔡注從之愚見吳下僕夫施鐵環于草履下以走沮洳之地可免顛蹶俗呼為甲馬亦呼為腳澀此僕傭所用豈以禹而用之故知如淳之說舛也韋昭云梮木器也如今輿床人舉以行此說頗近之愚謂史記作橋橋即今之轎也愚嘗登泰岱與五當絶頂其土人以竹兜子施皮絆於肩遇峻陡則挾之以行上下嶺坂如飛山行之具必不可易者豈以禹而廢之夫曰四載如舟車乃可以載惟其可載故可以乘若如淳之說置板于泥施鐵于履板鐵之類既不可謂之載足之所踐又豈可謂之乘乎夫禹稱神聖用物有宜水乘舟不病涉也陸乘車可致逺也泥乘橇從者曲其足也山乘橋僕者施其絆也勞形而有逸形者在逸形而有勞心者存此所以地平天成萬世永賴也或問子謂讀書有疑則闕今不闕四載可乎曰此無待于闕也水陸而廢舟車泥山而廢橇橋則沒世不行尋文矣故知大禹决不能舍斯四者而别有所濟也以理斷之也暨益奏庶鮮食或問鮮食何食也曰穀食也穀食何以謂鮮食曰新熟而食之不曰鮮乎詩云我取其陳食我農夫夫以舊粟為陳則以新粟為鮮宜矣問艱食何也曰穀食也既曰鮮又曰艱何也水之方導平原曠野即可耕也故不見其艱及治水底績畎澮俱修難耕之處穡人亦成厥功矣故於益言鮮食於稷言艱食鮮食見治水之次苐也漢宋諸儒皆以鮮食為鳥獸魚鱉之鮮殺者夫茹毛飲血泰古之時則然非所論于唐虞烹飪之世矣故單言食皆謂穀食食哉惟時是矣或問方禹隨山刋木稷未降種安得鮮食不知耒耜之制起自神農堯未得舜而東作西成未嘗廢也稷特修而備之耳故詩曰誕后稷之穡有相之道以五采彰施于五色愚按唐虞之世衣裳文繡服物采章何其盛也鳴球琴瑟鼗鼓笙鏞何其備也受終格于宗廟干戚舞于兩階玉帛行于交際四海備乎八音仰何其馴雅而有文也雖未言宫室器用而宫室器用可知天下豈有服物樂舞之類若此而處陋宫用惡器者易曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯自神農已然矣而禹貢篚匭織文檿絲𤣥纁璣組球琳琅玕皆京師之蓄積也韓非曰堯舜之有天下也堂髙三尺采椽不斫茅茨不翦雖逆旅之宿不勤于此矣冬日鹿裘夏日葛衣粢糲之食藜藿之羮飯土匭啜土鉶雖監門之飬不觳於此矣非之言過也夫以至聖開天立極垂世乃鄙陋若是則百揆四嶽九官十二牧可以居處服食乎當倮身而野處飢餓以從事矣故禹菲飲食惡衣服卑宫室亦以後世侈靡之君較之則然豈菲而至于藜藿惡而至于鹿裘卑而至于茅茨乎善乎孟子之論賦稅曰重之于堯舜之道者非輕之于堯舜之道者尤非故堯舜之制度折𠂻於奢儉古今之極則也秦皇欲縱欲以明得意故引非之言以鄙薄二帝梁武溺浮屠氏至以麵為犧牲皆不免于殺身而喪國也悲夫無若丹朱傲儒者之言曰舜之不為慢逰傲虐雖愚者亦當知之豈以禹而不知蓋以崇髙之位所以警戒者當如是也噫是未知人心之幾與舜之所以研其幾也夫空洞一心攻之者萬理欲之起倐乎忽乎故有髙朗絶倫之品而不能無凡庸卑鄙之心惟其檢察毫芒而轉移微渺人不知而聖人自知人不懼而聖人甚為之懼也易曰見幾而作不俟終日顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也故曰不逺復無祗悔元吉顔子曰舜何人也豫何人也有為者亦若是為之于幾而已矣愚少年有友曰陳道通慎獨寡過人也嘗謂余曰吾朝夕不能無禽獸之心賴廓清之早以繩墨自矯也不然吾其有遺行耶余曰此實聖功千古所同故禹警舜以丹朱周公戒成王無若殷王受之迷酗于酒也惟方寸難防故規誨痛切知幾也豈能與世儒之莾莾者道哉未幾道通夭矣每讀莊子吾無以為質矣吾無與言之矣未嘗不廢書流涕也弼成五服孔安國曰五服甸侯綏要荒也服五百里四方相距為方五千里儒者皆以為然愚竊疑之天下地勢南北長而東西差短况堯舜都冀冀已極北自冀北行十里即雲中出此皆夷狄沙漠之處詩曰薄伐玁狁至于太原安得有二千五百里之廣若東若西可僅僅焉若南則不止二千五百里之數即倍之可也故知五服各五百里者截長補短就各服言非必包甸服于中而四方相距為方五千里也何者勢弗得也試考之禹貢九州冀北矣東青兖西雍梁南豫東南徐揚西南荆甸侯綏要荒之制亦就九州規畫之耳必欲自宅土中而四面環拱護之則豫州之嵩髙而後可故周公作邑于洛謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然邑雖成而周仍都鎬至平王始遷之耳今言堯舜之冀若成周之洛也故不得不辨尚書疏衍卷二
