body:
  text: 尚書疏衍卷三明陳第撰三江旣入震澤厎定三江者何北江中江南江也嶓冡之漢為北岷山之江為中豫章之川歴彭蠡而入者為南經言江漢下文備矣何以不言南江蓋豫章諸川注彭蠡而入江漢者乃其順流之故迹非禹所嘗導故經不著然與江漢合流同至揚州京口入海安得而廢之鄭𤣥以為三江旣入入於海不入震澤斯言得之矣孔安國謂三江入震澤復由震澤而入海旣不知地勢之相隔韋昭以京口江為一吳淞江為二錢塘江為三贅矣蔡仲黙又以松江婁江東江當之是舍岷嶓之大而紀吳越之小水也可乎夫三江入海則跨江南北之洪水皆除而中吳之水得鍾于太湖故曰三江旣入震澤厎定而揚州之水條貫明矣嶓冡導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東匯澤為彭蠡東為北江入于海岷山導江東别為沱又東至于澧過九江至于東陵東迆北會于匯東為中江入于海嶓冡之漢何以為北江經云南入于江故為北也然岷山之江經云北會于匯何以云中江以有彭蠡豫章之水為南江故曰中江也故自彭蠡以上江漢自為南北彭蠡以下江漢列為南北中矣此其首尾脉絡至為明悉先儒或求北江於漢水之外豈可得乎且所謂匯者廻㳬之義凡兩水相入其衝激震盪之狀必㢠廻洑㳬轉故於漢曰東匯澤為彭蠡與蠡合也於江曰北會于匯與漢合也蓋省文以互見矣先儒謂北會于匯亦會于彭蠡夫與彭蠡會曰東則可曰北則不可至于九江之說古今不一孔安國蘓子瞻皆以潯陽九江當之然經云過九江至于東陵東陵者岳州巴陵也在潯陽之上逺甚若過潯陽九江無復逆至東陵之理矣按水經九江在長沙下雋西北曾氏蔡氏皆云即洞庭也洞庭合沅漸元辰叙酉湘資澧九水為湖故名九江斯言得之矣如此不惟地之相次有序亦水之順流不爽斷斷乎其不可易也况禹貢所表識必名山大川豈以洞庭大于彭蠡而反不叙及乎蓋北方之水莫大於河故凡水皆曰河南方之水莫大於江故凡水皆曰江洞庭之水未必止於九江九江其槩耳昔為九江今為洞庭所謂九江孔殷九江納錫大龜過九江至于敷淺原皆是物也潯陽之江雖亦有九皆眇小短近之水且在揚州之界矣又經内方至于大别過三澨至于大别杜預云大别不知何處據左傳吳楚夾漢而陳自小别至于大别意其近漢也愚嘗登黃鶴樓隔江漢陽郡東北山實名大别正漢水入江之處預偶未考耶愚於是而信禹之神聖也當洪荒時主名山川若指諸掌後世案經索之往往錯誤何耶蓋禹乘四載歴九州皆得諸親見儒者雖博稽載籍口耳而已矣無惑乎言之不詳也哉故曰讀萬卷書不行萬里道不足以知山川導渭自鳥䑕同穴愚讀山海經有鳥䑕同穴之山讀爾雅釋鳥云鳥䑕同穴其鳥為鵌其䑕為鼵郭璞釋鼵如人家䑕而短尾鵌似鵽而小黃黑色穴入地三四尺䑕在内鳥在外孔氏尚書傳曰共為雌雄張氏地理記云不為牝牡山在隴西首陽縣西南渭水所出蔡氏注云同穴山名鳥䑕者同穴之枝山也夫鵌鼵之為雌雄牝牡則不可知故郭璞並存之然同穴而處則明明可據也山實以是得名分為二山可乎漢之首陽今之渭源縣也屬臨洮朔南曁聲教訖于四海孔傳朔南曁聲教句訖于四海威侮五行問威侮五行之狀何以為罪曰五行者水火木金土天之所生民之所用最不可闕者也君人者必兢兢然愼修五行之政以治國而利民故水之政修則灌溉博火之政修則積聚完木之政修則山林茂金之政修則泉貨廣土之政修則稼穡成而養生喪死無憾也求之五事貌言視聽思以端其本參之庶徵雨暘燠寒風以考其詳故五事不正則五行不脩庶徵不應則五行不修誠其修也民得所而物咸寧四時和而八風暢是之謂至治之國使其暴殄之輕忽之而不修也則泛濫橫流而民病水熛燀煽爀而民病火山童澤涸而民病木輕重兼并而民病金田野荒蕪而民病土以其狂僭豫急蒙者而召咎徵則黎庶愁苦而灾異並興是之謂至亂之國夫國家大治王者所貴也國家大亂王者所伐也故曰天生五材民並用之順之則得福逆之則得禍誓師數罪莫此為重矣其可赦乎孔安國曰五行之德王者相承所取法有扈與夏同姓恃親而不恭是則威虐侮慢五行也孔頴達曰月令孟春三日太史謁于天子曰某日立春盛德在木夏云盛德在火秋云盛德在金冬云盛德在水此五行之德王者雖易姓相承其所取法同也有扈氏獨侮慢所以為大罪也意似緩而不切矣怠棄三正孔傳以為怠惰棄廢天地人之正道言亂常也似得之矣蓋三正當時必有所指如三才三綱之類此而怠棄之則身不修家不齊國不治是悖逆天常而滅絶人理所謂罪大而不可解者也或曰夏禹養民惟六府三事是亟威侮五行廢六府也怠棄三正廢三事也此意亦近之乃馬融云建子建丑建寅為三正蔡注因之彼不奉有夏之正朔則罪矣于子丑何與蔡又曰子丑之建唐虞之前當已有之鑿益甚矣五子之歌夫歌本韻語也但古今音不同不知古音以今音讀則齟齬弗諧非韻矣愚因列古音并證于左庶幾其可讀焉其一曰皇祖有訓民可近不可下民惟邦本本固邦寧予視天下愚夫愚婦一能勝予一人三失怨豈在明不見是圖予臨兆民懍乎若朽索之馭六馬為人上者奈何不敬下古讀虎予古讀舞圖古讀覩馬古讀母義則不異皇祖有訓民可近不可下一韻民為邦本本固邦寧予視天下此承上接下二韻愚夫愚婦一能勝予三韻一人三失怨豈在明不見是圖四韻予臨兆民懍乎若朽索之馭六馬五韻為人上者奈何不敬此結語不韻如周南麟之趾振振公子古讀止于嗟麟兮麟之定振振公姓于嗟麟兮葢趾子定姓為韻而于嗟麟兮不韻也又如召南彼茁者葭壹發五豝于嗟乎騶虞彼茁者蓬壹發五豵于嗟乎騶虞蓋葭豝蓬豵為韻而于嗟騶虞則不韻也下讀虎詩凱風爰有寒泉在浚之下有子七人母氏勞苦禮運粢醍在堂澄酒在下陳其犧牲備其鼎俎予讀舞詩鴟鴞徹彼桑土綢繆牖户上聲今女下民或敢侮予陸機與弟士龍詩永安有昨軌承明子棄予俯仰悲林薄慷慨含辛楚圖讀覩詩蒸民我儀圖之維仲山甫舉之愛莫助上聲之袞職有闕維仲山甫補之焦氏易林為𨽻所圖與衆庶伍馬讀母詩漢廣翹翹錯薪言刈其楚之子于歸言秣其馬屈原九歌霾兩輪兮縶四馬援玉枹兮擊鳴鼓其四曰闗石和鈞王府則有荒墜厥緒覆宗絶祀有古讀以祀古讀倚兩相韻義亦不異有讀以詩四月滔滔江漢南國之紀盡瘁以仕寧莫我有封禪頌馳我君輿帝用享祉三代之前葢未嘗有祀讀倚詩周頌於薦廣牡相予肆祀假哉皇考綏予孝子古讀止邯鄲淳答贈詩見養賢侯於今四祀既庇西伯永誓没齒愚讀五子之歌其一賦而婉其二簡而詳其三直而切其四怨而傷其五哀而不可為情惜乎太康之不悟也孟子曰不仁而可與言則何亡國敗家之有悲夫成湯放桀于南巢惟有慙德曰予恐來世以台為口實夫伐暴救民湯之亟也惟有慙德其心容有不自安者乎曰予恐來世以台為口實欲嚴萬世君臣之防也仲虺作誥推上天立君之意極夏氏矯誣之罪本善惡不兩立之勢狀盛德得民之深而終之以謙冲保命之道詳哉其言之矣然終不能解其慙曰後世必以是為法也其義何居噫君臣之際難言之矣商始祖契興於虞夏之間自昭明相土以來屬役於夏久矣湯亦親北面事之矣今畏天憂民放之南巢也謂拯民於水火則可耳謂媿天下後世人臣使無懷二心也者湯亦不敢自負乎曰慙曰恐道其心矣故當湯武之事以為適遭其窮不得已而行之是也以為順適吾志一無所累於心非也何者救世之道不能與尊君並行也孟子曰聞誅一夫紂矣未聞弑君也使夏商之太史執簡而書其事將曰商誅桀周誅紂乎抑曰履弑其君某發弑其君某乎未可知也春秋如陳靈齊莊禽獸行滅人理豈復有君道乎徵舒崔杼殺之夫豈非其自取夫豈非所以安民孔子書之曰弑然徵舒崔杼猶不賢也趙盾非古之良大夫乎亦以弑書於此見聖人不以仁而廢義矣知是道者惟漢之黃生黃生之難轅固也曰冠雖敝必加於首履雖新必闗於足上下之分也今桀紂雖失道然君上也湯武雖聖臣下也因過而誅之代立踐南面非弑而何於是景帝曰食肉不食馬肝不為不知味言學者無言湯武受命不為愚故孔子於革曰湯武順乎天而應乎人於傳曰伯夷叔齊古之賢人也交與之矣且自漢以來亂臣賊子夫孰不借口於湯武也湯之為來世慮其㫖不亦嚴乎故孔子贊湯武仁道也易道也其與伯夷義道也春秋道也矧予之德言足聽聞孔傳作一句讀謂道德善言足聼聞也惟元祀十有二月乙丑伊尹祠于先王奉嗣王祇見厥祖孔安國傳云太甲太丁子湯孫也太丁未立而卒及湯没而太甲立此據經也史記太丁未立卒湯崩太丁之弟外丙立二年崩外丙之弟仲壬立四年崩伊尹乃立太丁之子太甲與經不同蘇氏據史記而謬安國孔頴達據孔傳而妄史記愚謂經無明文則信傳記經有明文則止依經此不易之論也且考之帝系圖湯以乙未伐桀滅夏即天子位十三年丁未崩太甲湯孫以戊申嗣立三十三年庚辰崩太甲子沃丁以辛巳嗣立此以六甲紀年無所謂外丙仲壬也孔傳信矣問嗣王祗見厥祖曷為於十二月乎曰商以建丑為正故以十二月為正朔謁祖復辟以正朔之月行之重其事也問既以建丑為正何不改十二月乎曰夏正以寅為一月卯為二月遞數之至子丑為十一十二月以寅夘辰為春遞數之至亥子丑為冬此自唐虞以來未之有改也天地之常經古今之達道也若一改之則日時紊其序寒暑失其節何以欽若昊天而敬授民時乎蔡仲黙知之矣其言曰三代雖正朔不同然以寅月起數蓋朝覲會同頒厯授時則以正朔行事至於紀月之數皆以寅為首也又曰改正朔而不改月數於經史尤可考周建子矣而詩言四月維夏六月徂暑則寅月起數周未嘗改也秦建亥矣而史記始皇三十一年十二月更名臘曰嘉平夫臘必建丑月也秦以亥正則臘為三月云十二月者則寅月起數秦未嘗改也且秦史制書謂改年始朝賀皆自十月朔漢初仍秦正亦書曰元年冬十月則正朔改而月數不改亦已明矣噫此義宋儒多未達善乎仲黙之推言之也元祀者太甲之元年也孔安國云湯没而大甲立稱元年孔頴達云此見祖十二月者是湯崩之踰月復亳十二月者是服闋之踰月蓋三年之喪二十五月而畢故知湯崩於十一月而改元即於十二月也蘇子瞻曰崩年改元亂世之事不容伊尹在而有之此言似也不知商以十二月為正則十二月年之始而十一月者年之終也湯崩適在年之終無容不改十二月為元年矣何者正之始也况上古淳風未散不以改元為重秦始皇即位二十六年始併天下稱皇帝未嘗改次年為元年也漢髙以入闗稱漢元年至五年誅項籍諸侯及將相相與共請尊漢王為皇帝曰吾聞帝賢者有也吾不敢當帝位羣臣固請於是即位于汜水之陽然亦未嘗改元不似後世之張皇甚也質故也惟其不以改元為重故太甲之改不嫌於太亟秦漢不改不嫌於不尊爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗夫事有成敗德無大小故不可以德之小而忽之一念之德萬邦之慶恒於斯亦不可以不德之大而後畏之一念之不德七廟之墜恒於斯此非空言實有其事昔中山君饗都士大夫羊羮不遍司馬子期怒而走楚説楚伐中山中山君亡有二人挈戈而隨其後中山君顧謂二子奚為者也對曰臣有父嘗餓且死君下壺飱食臣父臣父且死曰中山有事汝必死之故來死君也中山君喟然而嘆曰與不期衆少其於當厄怨不期深淺其於傷心吾以一盃羊羮亡國以一壺飱得士二人詩曰民之失德乾餱以愆無言不讐無德不報王徂桐宫居憂克終允德君薨亮隂三年不言禮也在他嗣君本宅憂於宫中伊尹以太甲不惠故居之於桐欲其處靜土而興思顧湯墳而克念祖德也喪紀方畢君過已復故迎之卽位亦禮也伊尹始終以禮事其君太甲始終以禮自匡正至於百官總已以聽冡宰古之人皆然何必伊尹後世謂太甲不賢伊尹放之太甲賢又反之綜其實皆非矣愚獨有感於亮隂之制之善也何者天下大器也主器大事也著代大變也故納之幽憂寂寞則善心易生服之衰絰苴屨則侈心易息㗖之飦粥蔬食則欲心不流觀之用人行政則國是易習故教之居父母之喪實所以厲君人之德也歴考殷周之君不類者多克肖者寡以其僅守舊儀而弗克致誠以行之耳禮曰武丁者殷之賢王也繼世卽位而慈良於喪當此之時殷衰而復興禮廢而復起故謂之髙宗也漢文至德謙譲懼人以毁而廢事也遺詔已葬服大紅十五日小紅十四日纎七日釋服自是天子不行三年之喪矣固以朝無可信之臣不敢恭黙而久任之亦以情有不篤於所哀而虛文無益也其惟晉之武帝北魏之孝文乎外雖御事内實居喪且其所以答羣臣文辭郁然可觀議於千載之上而千載之下興於孝也不謂之賢且難乎故亮隂之禮未廢當法太甲髙宗三年之喪不行當法晉魏二帝克享天心受天明命孔傳云享當也所征無敵謂之受天命孔頴達曰德當神意神乃享之故以享為當也天道逺而人道邇天之命人非有言詞文誥正以神明祐之使之所往無敵謂之受天命也緯候之書乃稱有黃龍𤣥龜白魚赤雀負圖衘書以授聖人正典無其事也漢自哀平之世緯候始起假托鬼神妄稱祥瑞孔時未有其説縱使時已有之亦非孔所信有識哉其言之也夫上古以人徵天以德徵人故克諧以孝克勤克儉舜禹所以禪帝也克寛克仁同心同德湯武所以興王也虞夏殷周之書具在曷嘗有㣲渺竒異可以駭人見聞者乎自王莽矯符命欲以惑世而言緯候者始紛然緯七緯也候尚書中候也易緯如稽覽圖乾鑿度書緯如璇璣鈐考靈曜詩緯如紀歴樞含神霧禮緯如含文嘉稽命徵樂緯如動聲儀叶圖徵孝經緯如援神契鉤命决春秋緯如元命包嵗精符之類皆託於聖人所作而肆談怪妄不可窮詰光武以赤伏符興故篤信不疑大儒如鄭𤣥何休以之通經曹褒以之定禮卓然深嫉之以為亂中庸之典者不過桓譚張衡數子孰知受天明命者在克享天心克享天心者在聿修厥德乎德惟一動罔不吉德二三動罔不凶篤於保民君德也篤於承辟臣德也内外不二始終不變是之謂一君心或動於奢滛而政必移於末路臣意或分於寵利而官必敗於宦成是之謂二三語曰上帝臨汝無貳爾心又曰一心可以事百君百心不可以事一君言貴一也一則常二三則不常天命之去留民情之向背其幾總在於此故曰始終惟一惟和惟一協于克一一哉王心申重以教戒之老成臣長慮却顧之藎心也豈惟太甲永念之千載之帝範臣鑑在是乎在是乎王若曰格汝衆蘇東坡云書凡言若曰者非盡當時之言大意若此而已蔡注用之自後㣲子武成大誥㣲子之命康誥酒誥洛誥多士君奭多方立政君陳畢命君牙冏命文侯之命凡十七篇俱有若曰孔傳例以為順其事而言之愚謂若曰者蓋述其意而有未盡之詞史臣之約說也故周公以武王成王之命誥天下多繫之若意可想矣孔傳專以順訓於武成則曰順其祖業於大誥則曰順大道以誥天下衆國於㣲子之命則曰順道本而稱之於康誥則曰順康叔之德於酒誥多士君陳伯冏皆曰順其事於洛誥則曰順周公意於君奭立政皆曰順古道於多方則曰順大道於文侯之命則曰順其功而命之似牽繞而鑿矣無亦泥爾雅釋言之文而過乎無傲從康愚按盤庚三篇詞雖佶屈理實顯明上篇告在位之臣也無傲從康盡之矣傲慢上也康懷安也羣臣之所以不遷坐此然懷安猶可言也慢上不可言也舎刑不足以威之矣故曰服田力穡乃亦有秋不服田畝越其罔有黍稷皆言燕安之不可懷曰聒聒起信險膚不惕予一人不畏戎毒于逺邇不和吉言于百姓弗告朕而胥動以浮言侮老成人弱孤有幼皆言傲慢之不可長也夫上無所畏則何安之不懷夫既懷安則震動以遷必有所弗聽矣此不惟蔑視厥后實不顧綏先公之所以臣服于先王也罪其可救乎故曰用罪伐厥死罰及爾身弗可悔非予自荒兹德惟汝含德不惕予一人予若觀火予亦拙謀作乃逸君不思利民荒廢其德也臣不行君之令而布之民含藏君德也予不敢自荒其德而汝含德豈惟不愛民不畏我故也國之宜遷予知之審矣若觀火然予豈有他長哉圖謀遷都作成汝之終逸而已宜讀予亦拙句孔讀拙謀為句謂逸過也我不威脅汝徙是我拙謀成汝過儒者多用之竊以為未當遲任有言曰人惟求舊器非求舊惟新人求舊而器不求舊何也人舊則益習於事器舊則不全於用故也今國都亦器也既蕩析而敝壞矣安得不舍舊以圖新乎故盤庚用舊人遷新邑於遲任之㫖而有合矣引之宜哉愚於是獨有感於遷都之事也夫國家莫重於卜宅人情莫憚於轉徙今考書序與史記湯自商邱遷亳矣七傳而仲丁遷囂居河南再傳而河亶甲遷相居河北一傳而祖乙遷耿居河東六傳而盤庚渡河而南復居成湯之故都何其遷徙之亟也夫置器不定徙而之他猶以為擾况湯至盤庚十六代而五遷國是屢挈鼎器而屢徙移之民何以堪盤庚適遭其窮幸而賢君也故不以斧鑕齊之而以文誥格之是以勞來安集商道復興噫亦難矣竊意仲丁及河亶甲及祖乙其必有不當遷而遷者也不然何湯之故都而盤庚終不忍棄乎詩云邦畿千里惟民所止予迓續乃命于天予豈汝威用奉畜汝衆予念我先神后之勞爾先予丕克羞爾用懷爾然失于政陳于兹高后丕乃崇降罪疾曰曷虐朕民汝萬民乃不生生曁予一人猷同心先后丕降與汝罪疾曰曷不曁朕幼孫有比故有爽德自上其罰汝汝罔能迪古我先后旣勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死兹予有亂政同位具乃貝玉乃祖乃父丕乃告我高后曰作丕刑于朕孫迪高后丕乃崇降弗祥耿圯而不可居天之將絶民命也予遷之殷迓續乃命於天也豈威汝乎用畜養爾也且爾之身非始於今日始於爾之先我之畜爾亦非惟為爾亦念我先神后之勞來爾先故大克羞爾用懷爾者思無忝厥祖故也然我固以先祖故而懷爾先祖尤以爾我故而昭示於赫赫使殷可遷而不遷為失於政耿不可久而故久為陳於兹髙后降我罪疾謂虐汝也今不失不陳所以生汝汝不肯生生而外心於我先后不降與汝罪疾乎盤庚告羣臣曰爾祖其從與享之言有功之臣配享於廟告民曰先王既勞乃祖乃父言子子孫孫相繼為君民以相聽令也不奉我令先自棄已爾祖父其救乃死乎此非汝民之罪由亂政在位之臣據土地貨殖之利聚寳貝金玉之富動浮言以惑衆聽爾祖父且告我髙后而崇降弗祥耳神之所禍孰能解之乎記曰殷人尊神率民以事神先鬼而后禮此之謂也愚讀予丕克羞爾用懷爾句然失于政然字帶下詞矯健意深遠各設中于乃心中猶中央不偏也不偏則正矣古人舉事思其利必雜以害圖其安必參以危故謀克當而行無不順也今臣民之不從盤庚者但見不遷之為是而不知其中之有非但見遷之為非而不知其中之有是所以胥動浮言而不顧君人惠恤之徳意也偏故也使其設中于心易地而互思之將不終朝而耿然悟矣詩曰民之無良相怨一方夫一方非中也各執一方以相怨其害寧有涯哉故曰汝猷黜乃心曰汝克黜乃心曰惟汝自生毒曰汝曷弗念我古后之聞曰乃咸大不宣乃心曰汝不謀長以思乃災曰恐人倚乃身迂乃心曰曁予一人猷同心總之設中之意委婉哉其說之長欲以悅服衆志也不然遷之利害兩言决矣何至諄諄一千二百八十有餘言而後止乎惟口起羞夫至道必精至言必簡愚於傅說見之矣自惟口起羞至事神則難天下之道備是乎謹言也慮變也重賞也愼罰也擇人也從善也趨時也守謙也豫防也戒䙝也訟過也化民也敬祀也式禮也經緯治道劘切君身凡一十四事而以一百一十九言該之可不謂簡乎西漢通達國體莫若賈誼其治安䇿千古所膾炙也以今觀之大都論衆建諸侯制馭匈奴閭閻奢侈風俗偷薄豫教太子禮貎大臣六事耳乃至五千八百二十言雖古今事勢不同用說命於漢文之朝則拙然亦見簡約詞章之難也善乎蘇子瞻曰傅說之言若散而不一一言一藥皆足以治天下之公患豈獨以訓武丁哉人至於今誦之也旣乃遯于荒野入宅于河自河徂亳曁厥終罔顯孔傳以為髙宗之遯非也惟蘇子瞻得之其說曰古之君子明王之世而不肯仕蓋有之矣許由不仕堯舜夷齊不仕周商山之老不仕漢懷寳迷邦以終其身是或一道也武丁為太子則學于甘盤武丁即位而甘盤遯去隱于荒野武丁使人求之迹其所徃則居河濵自河徂亳不知其所終若云武丁遯於荒野武丁為太子而遯决無此理遯則如吳太伯豈復立也哉學者徒見書云其在髙宗時舊勞于外故以武丁為遯小乙使武丁劬勞于外以知艱難决非荒野之遯斯言也足以解千古之惑矣說曰王人求多聞時惟建事孔傳王者求多聞以立事是以王人為王者猶言君人人君之類此本無可疑者蔡注謂說稱王而告之曰人求多聞以王為句且引林氏之說與禹稱舜曰帝光天之下文勢正同似鑿矣昔先正保衡作我先王乃曰予弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時予之辜甚哉髙宗能言伊尹之心也孟子序伊尹曰予天民之先覺者也予將以斯道覺斯民也思天下之民匹夫匹婦有不被堯舜之澤者若已推而内之溝中本髙宗之說矣夫伊尹曷為能然蓋伊尹所樂堯舜之道堯舜以天下與人彼其視天下一芥也伊尹慎取與外寵利所以澡雪其心者素也夫人惟貪没於利也則不恤其君為桀紂惟其盡絶乎利也則必望其君為賢聖此自然之效也故無堯舜之心而欲建唐虞之業無伊尹之志而欲成救民之功不可得也已今之論學者動以孔子為法然不知江漢秋陽之謂何而遑遑於載贄之憂汲汲於及門之廣是優孟之學叔敖也悲哉西伯旣戡黎書序只云作西伯戡黎未嘗明指其人孔蔡皆以為文王孔傳又云文王率諸侯以事紂内秉王去聲心紂不能制其言益謬矣史記膠鬲觀兵問西伯曷為而來是謂武王為西伯蓋文王薨武王立其稱西伯固宜文王脱羑里之囚紂賜弓矢鈇鉞得專征伐故嘗伐崇伐宻伐阮伐犬戎矣然崇即豐土密阮犬戎皆西北荒裔之地伐之得也若黎則不然紂都朝歌黎在上黨相去三百餘里伐黎則震於王畿之鄰矣豈以文王之至德為之故黎無罪則不伐有罪必請命天子而使郊圻無恐本征伐之大義也今觀祖伊之詞曰天訖殷命曰大命不摯訖畢摯持也謂殷之大命已畢而不能自持是旦夕滅亡之兆矣非武王之事而何哉先儒吳氏以戡黎之師在伐紂之時此非有明文可據然不為文王則斷斷可知也今殷民乃攘竊神祗之犧牷牲用以容將食無災孔傳曰色純曰犧體全曰牷牛羊豕曰牲器實曰用盗天地宗廟牲用相容將食之無災罪之者言政亂也正義曰犧牷牲爼實也粢盛器實也泰誓曰犧牲粢盛既于凶盗是犧牷牲用為句至明晰犧牷牲句用以容句其可通乎尚書疏衍卷三
