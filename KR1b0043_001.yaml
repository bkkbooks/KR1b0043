body:
  text: 尚書䟽衍卷一眀陳第撰尚書攷尚書有今文古文今文二十八篇曰堯典曰臯陶謨曰禹貢曰甘誓曰湯誓曰盤庚曰髙宗肜日曰西伯戡黎曰㣲子曰牧誓曰洪範曰金縢曰大誥曰康誥曰酒誥曰梓材曰召誥曰洛誥曰多士曰無逸曰君奭曰多方曰立政曰顧命曰吕刑曰文侯之命曰費誓曰秦誓是也合序為二十九古文二十五篇曰大禹謨曰五子之歌曰𦙍征曰仲虺之誥曰湯誥曰伊訓曰太甲三篇曰咸有一徳曰說命三篇曰泰誓三篇曰武成曰旅􅋙曰微子之命曰蔡仲之命曰周官曰君陳曰畢命曰君牙曰伯冏是也今文本自伏生伏生為秦博士當秦焚書伏生壁藏之及漢定求其書亡数十篇獨得二十九篇即以教於齊魯之間古文本自孔安國魯共王壊孔子宅欲以為宫而得古文於壊壁中以校今文多二十五篇安國獻之漢武受詔作傳又于堯典分出舜典臯陶謨分出益稷盤庚分出二篇顧命分出康王之誥合今文古文共為五十八篇傳成值巫蠱之禍不及上聞世弗得而見之也先此有得偽泰誓者謂之今文泰誓與安國泰誓不同儒者聞安國尚書有五十八而未之見遂有張覇之徒亦于伏生書分出盤庚二篇康王之誥一篇為三十一篇増入偽泰誓三篇又偽作舜典一篇汨作一篇九共九篇大禹謨一篇益稷一篇五子之歌一篇𦙍征一篇湯誥一篇咸有一徳一篇典寳一篇伊訓一篇肆命一篇原命一篇武成一篇旅􅋙一篇冏命一篇亦為五十八篇篇目雖與安國同自泰誓而下二十七篇皆非安國之舊矣劉向作别録班固作藝文志及後漢書儒林傳所稱古文尚書者實皆張覇之偽書非安國之古文故馬融鄭𤣥劉歆趙岐服䖍韋昭王肅杜預之倫皆未見孔傳故鄭𤣥註禮記趙岐註孟子韋昭註國語杜預註左傳凡有引用二十五篇者皆曰逸書曰篇亡道其實也安得以目所未見而附㑹以為知乎至晉鄭沖始得古文以授蘇愉愉授梁桞桞皇甫謐之外弟也謐于桞邉得古文尚書故作帝王世紀桞授臧曹曹授梅賾賾于前晉奏上而施行焉自是人人知有古文矣余按孔頴逹所攷而詳其顛末如是則見斯文興廢不偶然也古文辨孔安國古文二十五篇至東晉始顕唐人疏之始大行于世未有議其為偽者宋吳才老始曰安國所増多之書皆文從字順非若伏生之書詰曲聱牙至有不可讀者朱考亭因之曰安國書至東晉時方出前此諸儒皆未見可疑之甚吳草廬又因之曰二十五篇采緝補綴無一字無所本而平緩卑弱殊不類秦漢以前之文噫三子言出疑古文者紛然矣愚竊以為過也今文自殷盤周誥外若堯典臯謨甘誓湯誓髙宗肜日西伯戡黎牧誓洪範無逸顧命何嘗不文從字順乎必詰曲聱牙而後可則魯論不得與繫辭並行矣何者竒正異也况書之顕晦亦自有時公羊立學官自漢武始榖梁立自漢宣漢平之世劉歆移書博士始立左氏漢初詩有齊魯毛韓四家而毛最後出傳禮者五家而小戴最後出班固漢書采自史記自後漢至晉註觧漢書者二十餘家史記未有也卒之左氏毛詩小戴史記皆盛行至今抑不特書為然大禹治水勒碑南岳翳于林莽数千年韓昌黎刻意求之弗得至宋末嘉定而始露至明嘉靖而始傳似未可以前人未見而謂作禹碑者偽也左國禮記諸書稱引二十五篇彬彬具在今謂作古文者采綴為之是倒置本末而以枝葉作根榦矣且其紀綱道徳經緯人事深沉而切至髙朗而矯健又安見其平緩卑弱乎先漢之文渾雄馳騁本其所長然偏駁或悖乎理義斷制不醇乎徳音故不可與古文並論也孔頴逹曰古文經雖然早出晚始得行其詞富而偹其義𢎞而雅故復而不厭乆而愈亮可謂知言也已嗟夫書之所以貴真以其言之得也足以立極也所以悪偽以其言之失也不足以垂訓也今自天子公卿大夫士庶人服習古文而皆耿然有裨于性情治理乃不得其精妙區區以迹訾之不亦逺乎近世旌川梅鷟拾吳朱三子之緒餘而譸張立論直㫁謂古文晉皇甫謐偽作也集合諸傳記所引而補綴為之似矣不知文本于意意逹而文成若彼此瞻顧勉強牽合則詞必有所不暢今讀二十五篇抑何其婉妥而條逹也又如禹謨克艱二語謂本論語之為君難為臣不易也不矜不伐謂本老子之夫惟不争故天下莫能與争也滿招損謙受益謂本易之謙尊而光卑而不可踰也不知宇宙殊時而一理聖賢異世而同心安得以其詞之相近也而遽謂其相襲乎又如人心道心則謂本之道經嘗考荀子曰舜之治天下不以事詔而萬物成故道經曰人心之危道心之㣲註者曰此虞書語而云道經盖有道之經也即虞書也今鷟指為道經豈别有所據乎又如五子之歌欝陶乎予心顔厚有忸怩謂欝陶取孟子顔厚取諸詩𦙍征之火炎崑岡玉石俱焚取諸三國志仲虺之慚徳取諸季札曰聖人之𢎞也而猶有慚徳口實取諸王孫圉曰以寡君為口實湯誥之降𠂻取諸夫差曰天降𠂻于吳伊訓從諫弗咈取諸班彪之從諫如順流太甲升髙陟遐取諸中庸之行逺自邇登髙自卑咸有一徳之觀徳觀政取諸吕氏春秋之引曰五世之廟可以觀德萬夫之長可以生謀說命建邦設都取諸墨子尚同之篇泰誓離心離徳取諸子太叔曰棄同即異是謂離徳武成歸馬放牛取諸樂記馬散之華山之陽而弗復乗牛散之桃林之野而弗復服旅獒為山九仞謂為山取諸論語九仞取諸孟子㣲子之命余嘉乃徳取諸左氏王命管仲曰余嘉乃勲應乃懿徳蔡仲之命致辟管叔于商囚蔡叔于郭鄰取諸祝佗云管蔡惎間王室王于是乎殺管叔而蔡蔡叔周官制治于未亂保邦于未危取諸老子為之于未有圖之于未亂君陳勿辟勿宥取諸文王世子公曰宥之有司曰在辟公又曰宥之有司又曰在辟畢命收放心取諸孟子求其放心而已矣君牙思其艱以圖其易取諸老子圖難于其易為大于其細伯冏交修不逮取諸楚語衛武公曰朝夕交戒我諸如此類難以悉数句疵其攘字剥其竊無非欲二十五篇古文盡廢之而後已語曰不有廢也其何以興故廢禹謨而復有禹謨者出廢五子之歌與𦙍征而復有五子之歌與𦙍征者出廢商周仲虺諸篇而復有仲虺諸篇者出則廢之誠是也然由君子觀之不可廢也何者二十五篇其㫖奥其詞文卑而髙近而逺幽通鬼神明合禮樂故味道之士見則愛愛則玩紬繹而浸漬嘆息而咏歌擬議之以身化裁之以政定事功而成亹亹矣孰是書也而可以偽疑之乎故疑心生則味道之心必不篤矣夫干將鏌鎁沉埋豐獄人莫之知也張華雷煥出之遂為天下寳古文之出于東晉亦猶是也前漢民間得泰誓三篇有白魚入于王舟火復于王屋流為烏諸語董仲舒司馬遷皆引用之矣馬融書序曰泰誓後得案其文似若淺露又春秋引泰誓曰民之所欲天必從之國語引泰誓曰朕夢恊朕卜襲于休祥戎商必克孟子引泰誓曰我武惟揚侵于之疆則取于殘殺伐用張于湯有光孫卿引泰誓曰獨夫受禮記引泰誓曰予克受非予武惟朕文考無罪受克予非朕文考有罪惟予小子無良今文泰誓皆無此語吾見書傳多矣所引泰誓而不在泰誓者甚多孔頴逹曰今泰誓所無者古文泰誓皆有則古文為真復何疑乎乃後儒又以集合傳記摽奪句字疑之不識必何如而後可也嗟夫質諸理而後天下之至言可知也徴諸用而後天下之大業可見也今聊舉其一二曰可愛非君可畏非民曰予視天下愚夫愚婦一能勝予曰惟天生民有欲無主乃亂曰古有夏先后方懋厥徳罔有天災山川鬼神亦莫不寕暨鳥獸魚鱉咸若曰有言逆于汝心必求諸道有言遜于汝志必求諸非道曰匹夫匹婦不獲自盡民主罔與成厥功曰予弗克俾厥后惟堯舜其心媿耻若撻于市一夫不獲則曰時予之辜曰我聞吉人為善惟日不足凶人為不善亦惟日不足曰玩人䘮徳玩物䘮志曰為善不同同歸于治為悪不同同歸于亂曰位不期驕禄不期侈曰惟民生厚因物有遷違上所命從厥攸好曰嗚呼罔曰弗克惟既厥心罔曰民寡惟慎厥事曰爾身克正罔敢弗正民心罔中惟爾之中曰非人其吉惟貨其吉若時瘝厥官此皆精絶純粹之談古今不易之定論也采之何書取之何策乎故曰質諸理而後天下之至言可知也嘗試有虗中之主願治之君爰以伊訓說命進而格之則賈誼可無痛哭之䟽陸贄不煩累牘之章矣又或有暴戾之衆乖梗之俗爰以君陳畢命術而施之則商鞅可無峻法廣漢可無缿筒矣故曰徴諸用而後天下之大業可見也是故服劒者期于銛利而不期于墨陽莫邪乗馬者期于千里而不期于驊騮騄耳誦書者期于甄物成化而不期于今文古文况今文古文實皆上古之遺書故不精于論則不知古文不知古文則不知今文借曰予知徒以名取之而已矣是故宋人之疑尚在两可之間至鷟作尚書譜醜乎罵矣是非君子之言逹人所屏棄也引書證昔孔子觀書周室得虞夏商周之典删其善者百篇與詩易禮樂並行以教後世遭秦亂伏生壁而蔵之竟亡数十篇及孔安國得古文尚書多二十餘篇是伏生所亡即安國所得也校之百篇尚存其半豈非斯文之大幸歟後儒乃以今文為真也古文偽也不過謂文章爾雅訓詞坦眀耳以今觀于左國禮記及諸書傳引二十五篇者多至八九章少亦三四章皆爾雅坦眀無有艱深險澀語也豈所引者皆偽乎夫為諸書所稱引者既皆爾雅坦眀而諸書所未稱引者必欲其艱深險澀是一篇而二體也豈虞夏商周之本經乎愚故臚而列之以俟觀考者焉若引用今文則弗録人既弗疑無庸贅矣吕氏春秋引夏書曰天子之徳廣運乃神乃武乃文左傳文公七年郤缺引夏書曰戒之用休董之用威勸之以九歌俾勿壊莊公八年公引夏書曰臯陶邁種徳徳乃降㐮公二十一年臧武仲引夏書曰念兹在兹釋兹在兹名言兹在兹允出兹在兹二十三年仲尼引夏書曰念兹在兹哀公六年孔子引夏書曰允出兹在兹襄公二十六年聲子引夏書曰與其殺不辜寕失不經孟子引書曰洚水警予襄公五年引夏書曰成允成功國語内史過引夏書有之曰衆非元后何戴后非衆罔與守邦墨子引禹誓曰濟濟有衆咸聽朕言蠢兹有苖用天之罰孟子引書曰祗載見瞽瞍夔夔齊栗瞽瞍亦允若皆大禹謨文也禹謨當云虞書以事關禹故目為夏書猶洪範本周書以箕子所陳故傳引之曰商書左傳襄公四年魏絳引夏訓有之曰有窮后羿國語單襄公引書曰民可近也不可下也知伯國引夏書有之曰一人三失怨豈在眀不見是圖哀公六年孔子引夏書曰惟彼陶唐帥彼天常有此冀方今失其行亂其紀綱乃㓕而亡單襄公引夏書有之曰關石和鈞王府則有皆五子之歌文也襄公二十一年祁奚引書曰聖有謨訓眀徴定保襄公十四年師曠引夏書曰遒人以木鐸狥于路官師相規工執藝事以諫昭公十七年大史引夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走昭二十三年公子光云吾聞之曰作事威克其愛雖小必濟皆𦙍征文也孟子引書曰葛伯仇餉又引書曰湯一征自葛始天下信之東面而征西夷怨南面而征北狄怨又引書曰徯我后后來其蘇宣公十二年隨武子引仲虺有言曰取亂侮亡兼弱也襄公十四年中行獻子引仲虺有言曰亡者侮之亂者取之推亡固存國之道也三十年子皮曰仲虺之志云亂者取之亡者侮之推亡固存國之利也皆仲虺之誥文也論語引曰予小子履敢用𤣥牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬墨子引亦同國語單襄公引先王之令有之曰天道賞善而罰滛故凡我造國無從匪彛無即慆淫各守爾典以承天休内史過引曰余一人有罪無以萬夫萬夫有罪在余一人皆湯誥文也孟子引伊訓曰天誅造攻自牧宫朕載自亳大學引太甲曰顧諟天之眀命緇衣引尹吉曰惟尹躬先見于西邑夏自周有終相亦惟終坊記引書云厥辟不辟沗厥祖緇衣引太甲曰毋越厥命以自覆也若虞機張往省括于度則釋公孫丑引伊尹曰予不狎于不順表記引太甲曰民非后無能胥以寕后非民無以辟四方昭公十年子羽引書曰欲敗度縱敗禮孟子引太甲曰天作孽猶可違自作孽不可活又引書曰徯我后后來其無罰緇衣引尹吉曰舊註吉當為告古文誥字之誤惟尹躬及湯咸有一德皆伊訓太甲咸有一徳文也國語白公引武丁作書曰以余正四方余恐徳之不類兹故不言孟子引書曰若藥不瞑眩厥疾不瘳緇衣引兌命曰舊註兌讀為說惟口起羞惟甲胄起兵惟衣裳在笥惟干戈省厥躬又引兌命曰爵無及悪徳民立而正事純而祭祀是為不敬事煩則亂事神則難國語白公引書必交修毋余棄也學記引兌命曰敬遜務時敏厥修乃來又引兌命曰斆學半文王世子引兌命曰念終始典于學皆說命文也孟子引書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟我在天下曷敢有越厥志襄公三十一年穆叔引太誓曰民之所欲天必從之昭公元年子羽引太誓國語單襄公引太誓亦同昭公七年史朝曰筮襲于夣武王所用也國語單襄公引太誓曰朕夣恊朕卜襲于休祥戎商必克昭二十四年萇𢎞引泰誓曰紂有億兆夷人亦有離徳余有亂臣十人同心同徳臧宣叔曰太誓所謂商兆民離周十人同孟子引泰誓曰天視自我民視天聼自我民聼又引泰誓曰我武惟揚侵于之疆則取于殘殺伐用張于湯有光墨子兼愛篇引泰誓曰文王若日若月乍照光于四方于西土坊記引泰誓曰予克紂非予武惟朕文考無罪紂克予非朕文考有罪惟予小子無良皆泰誓文也襄公三十一年北宫文子曰周書數文王之徳曰大國畏其力小國懐其徳昭公七年無宇曰昔武王數紂之罪以告諸侯曰紂為天下逋逃主萃淵藪孟子引東征綏厥士女匪厥𤣥黄紹我周王見休惟臣附于大邑周又曰吾于武成取二三策而已矣以至仁伐至不仁而何其血之流杵也皆武成文也仲尼對陳人問隼曰昔武王克商通道于九夷八蠻僖公五年宫之竒引周書曰民不易物惟徳繄物皆旅􅋙文也定公四年祝佗云蔡仲改行帥徳周公舉之以為已卿士見諸王而命之以蔡其命書云王曰胡無若爾考之違王命也僖五年宫之竒引周書曰皇天無親惟徳是輔襄二十五年太叔文子引書曰慎始而敬終終以不困皆蔡仲之命文也論語引書曰孝乎惟孝友于兄弟施于有政僖公五年宫之竒引周書曰黍稷非馨眀徳惟馨緇衣引君陳曰未見聖若弗克見既見聖亦不克由聖緇衣引君陳曰出入自爾師虞庶言同坊記引君陳曰爾有嘉謀嘉猷入告爾君于内女乃順之于外曰此謀此猷惟我后之徳於乎是惟良顕哉國語富辰引書有之曰必有忍也若能有濟也皆君陳文也緇衣引君雅曰牙雅古通音夏日暑雨小民惟曰怨資冬祈寒小民亦惟曰怨孟子引書曰丕顯哉文王謨丕承哉武王烈佑啟我後人咸以正無缺皆君牙文也愚按古文二十五篇其未為諸書稱引者僅微子之命周官畢命冏命四篇耳然皆文從字順曷嘗有詰曲聱牙之體乎夫文本于事事致于理要以逹上下之情齊衆寡之論宣祗懼之㫖暢堙欝之𠂻導之善所以禁其惡約之正所以絶其邪典謨訓誥誓命貢征歌範皆是物也故或時而正或時而竒正而愚夫愚婦知之竒則文人學士不能以句而作者無心也譬之指以揮音而音非指履以出跡而跡豈履也哉故善讀書者遇竒而不求其正值正而不求其竒始也誦言以索意既也得意而忘言若與古人揖讓于一堂而晤言于一室目覩其色耳聞其聲身廸其矩而心聆其神也善善而無惡正正而無邪世治則以行吾道世亂則以㓗吾身夫是之謂深于書者也詩曰既見君子庶幾有臧尚書評夫書之不全皆委之秦火矣按秦本記始皇三十四年李斯議謂諸生不師今而學古以非當世惑亂黔首令天下有藏詩書百家語者悉詣守尉襍燒之越三年始皇崩又越三年二世㓕又越五年漢髙即皇帝位焚書之年嵗戊子漢髙即位嵗己亥相去十二年耳且張蒼秦之柱史叔孫通伏生秦之博士陸賈酈食其申公軰皆秦儒生豈以十二年之間遂至一廢掃地莊子云詩書禮樂鄒魯之士搢紳先生多能眀之孟子荀卿述王道論詩書其及門弟子往往散處列國戰國去秦何幾一經焰火遂爾澌滅何也且漢興至武帝亦六七十年間耳伏生出壁藏謂之今文孔安國得壁藏謂之古文卒莫能有辨其是非以致或行或不行而張覇之倫復得以偽作傳信于世司馬遷董仲舒皆引白魚入舟之事實覇書也豈秦及戰國功利之習浹人膚髓而士生其時惟學從横長短攻戰之術與夫尊秦儀禮之制而尚書古經無復有讀之者耶史稱髙皇帝誅項籍引兵圍魯魯中諸儒尚稱誦習禮法弦歌之音不絶此其時去秦愈近豈謂講誦者皆非尚書古文耶不然何冺冺也其故不可知也漢武行幸河東嘗亡書三篋詔問莫能知惟張安世識之具作其事後購求得書以相校無所遺失秦漢之際遂無若人可悲也哉尚書之文簡短而深閎眀雅而窔奥玩之愈淵行之愈切測之不可以為象䘚然而置于前則令人驚怪不知何從而得之也誠宇宙間至文哉故自漢至今文士多矣然必以太史公為絶匠何者以竒勝也故當世人物一經序傳班固兢兢録之稍改句字一二適以顯其益竒故後世論史或病其取與之謬或譏其稽考之疎此誠有之然至于文章之竒妙未有不嘆賞而拱手推服之也觀其于左國國策世本楚漢春秋諸書剪綴而運量之揚㩁而變化之縱其所至若波濤萬里而不知其所歸孰為太史公孰為非太史公若淄渑混合但見其淪漣浩渺而已不能以目辨之也盖得其意放其詞伸縮自在行止由己想其致思運筆之趣若飄飄乎天馬蜚空不自知其竒矣乃臨當尚書之文眴然而目眩怵然而手拙故于堯舜禹湯武典謨誓誥皆兢兢録焉即有句字之改亦猶班固之于太史公也盖其意不足以包貫之詞欲踴躍而馳騁可乎髙宗肜日曰罔非天𦙍典祀無豐于昵今曰罔非天繼常祀毋禮于棄道其義不可通也不寕惟是金縢一書破㫁為二前序册祀之意以及鴟鴞之貽末言周公卒後暴風雷雨王開金縢見書曰朕小子其迎夫既卒矣又何迎乎此不無少舛也不寕惟是文侯之命平王命晉文侯仇作也今以為襄王命文公重耳之詞盖見左傳彤弓矢玈弓矢秬鬯一卣之賜同未及察其詞之異也凡若此類皆如涇渭之合清濁判然欲新竒而弗得矣其惟孟子乎孟子述堯舜湯武不一而足猶然孟子輿之文人不得而窺其間也意得也愚嘗謂孟子之文在太史公之上詩莫妙于毛詩文莫妙于尚書毛詩之妙愚于古音考述其梗槩矣尚書之妙豈惟其政事道徳之宗抑亦具典要體裁之雅後世莫窺其涯涘也夫文章乾坤之大用士能文者操觚伸紙孰不以宗古自命然法唐宋止矣進之史漢止矣又進之左國畫然止矣盖時勢所束而著作各有所施也昔王莾居攝東郡興師莾依周公作大誥諭之純襲其詞卒不及自遣一語彼謂誦法周公宜若是矣不知修詞立言貴得古人之精意襲其意上也襲其詞下也襲詞而取其十之四五不足觀矣况通篇謄寫則己之情不逹己之情不逹欲以曉人風世曷繇哉且武庚三監叛周公欲征之而老臣舊人頗謂不可故述王命陳其卜吉孜孜焉莾時翟義劉信舉事命將出師舉朝皆以為請烏用大誥為乎譬之四尺童子見賔客清談亦拱手效之雖得其口吻而昩其事情故莾之大誥童子之為也一恒人醜之矣惟唐韓退之獨知五十八篇為文字之祖故淮西碑法舜典也佛骨疏法無逸也畵記法顧命也詞意並佳遂成絶筆桞子厚曰本之書以求其質夫書豈獨質而已哉噫此特為文論之也尚書疏衍卷一
