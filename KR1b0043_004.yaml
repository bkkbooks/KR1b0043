body:
  text: 尚書疏衍卷四明陳第撰惟十有三年春大會于孟津十有三年武王即位之十三年也此明明經文本無可疑者孔安國泥於大統未集之語遂以虞芮質成之日為文王受命之年九年文王崩武王立二年觀兵又二年伐紂總之為十三年是以武王上冒文王之年合而數之也夫當虞芮質成殷帝赫然在上文王以服事殷乃擅自改元以識受命之始可乎此雖庸人知其不然歐陽永叔辨之詳矣愚按史記於周本紀云武王即位九年上祭于畢東觀兵至于盟津於魯世家云武王九年東伐至盟津周公輔行十一年伐紂至牧野又帝系圖以六甲推之謂武王己巳嗣為西伯至十一年己卯伐紂即天子位七年乙酉崩且其所論年月與傳十一年合與經十三年不合然武王即位自為紀年而不冒文王之年以為年也昭然可考也或疑夷齊叩馬而諫曰父死不葬爰及干戈可謂孝乎夫叩馬之言萬世所傳信也惟其以叩馬為信則不得不以伐紂為亟惟其以伐紂為亟則不得不援文王之年而入之武也王十朋謂經之記年不爽叩馬之記亦自不虛故為之説曰文王非受命於天受命於商也文王出羑里之囚紂使之得專征伐至九年而卒是受商命以專征非受天命以自正也武王嗣位繼文王征伐而觀政於商泰誓之作在周家專征十有一年之日武王未有天下之初是則書與叩馬之年皆可信矣信斯言也受命之説雖異於孔而紀年不分猶夫故而已矣夫即位改元古今不易文王嗣位改元矣而又改元是不必改而改也武王嗣立宜改元矣而乃襲文王之年是可改而不改也恐非聖人正始正終之意與本紀世家又何以乖也永叔曰畢喪伐紂出於諸家之小説太史公作伯夷傳載父死不葬之言皆不可為信其見晢矣愚嘗讀伯夷傳擊節其文而不取其情實也孔子曰逸民伯夷叔齊餓於首陽之下逸民隱士也隱而窮餓士之常者非必餓而死也今讀采薇之詩不勝其悲矣古達人之趣操恐不若是孟子敘述伯夷栁下惠伊尹最為詳悉於叩馬獨不槩見大都太史公借以發其感慨報施之道與君子所以不詭隨於世者不必深究其事之有無可也肆豫小子發以爾友邦冡君觀政于商惟受罔有悛心傳謂十一年觀兵十三年伐紂合序與經文言之也今曰觀政于商曰罔有悛心曰罔懲其侮則觀兵之事當時所必有矣蔡仲默力辨之謂觀兵則脅君脅君不臣也惟應一舉兵而滅之頓絶其命耳一日而命未絶則為君臣當日而命絶則為獨夫是以伐紂為可而以脅紂為不可也然十三年起兵之初紂之分尚未絶也其誓師之言曰獨夫受何也又曰受克豫非朕文考有罪惟豫小子無良儻其牧野之戰不勝寧能帖然豐鎬之間以待商之誅之耶抑亦飭戎更駕必於行天之罰也且脅君孰與伐君可伐於二年之後不可脅於二年之前豈所以論商周之際哉儒者又謂湯武皆以兵受命然湯之數桀也恭武之數紂也傲湯猶有慙德之言而武無口實之慮此皆時勢使然不可疑泰誓非真也或問觀政于商欲紂之悛改使其悛也武王當復北靣事之歟蘇子瞻曰否文王武王天下歸之久矣紂若改過不過存其社稷宗廟而封諸商使為先王後也以為武王退而示弱固陋而曰復北靣事之亦過也吁蘇子之言不迂矣武成愚按武成首言伐商偃武次言廟祭柴望因邦君百工之受命乃追敘烈祖之勳德及遏亂東征之詳以至戰勝定功簡賢才賚萬民之事於是以制治之大體結之朗健流暢輕重有倫其文詞甚可觀其述事甚可法今為考定武成理固未妨而尚古文章之體製失矣故不如不定之為渾金璞玉也尚書出於煨燼豈能盡無錯簡然不在武成篇也善讀者自得前徒倒戈攻于後以北血流漂杵愚謂前徒者武王之前行也倒戈者乘勝而奮若山之崩倒不可禦也攻于後以北者紂之前距散敗故攻其後後亦奔北矣此破竹之勢也夫兵凶器也不交則已交有不傷者乎血流漂杵紀其實也儒者為之説曰紂衆服周無有戰心前徒倒戈反攻其在後之衆以走自相屠戮遂至血流漂杵耳信斯言也是紂之前徒雖背商以歸周紂之後徒實操戈以敵愾且為周且為商半疾降半疾戰斬馘濺血皆紂之士自為之而於周無與也則尚父不勞於鷹揚武王無待於肆伐矣豈理也哉夫紂之虐尚不及秦秦民之欲得賢君亦大旱望雨也然章邯輩出關東逐周章破殺項梁陳勝且以武庚敗亡之餘猶能使周公缺斨破斧况以其全盛之兵豈不能效力一戰乎惟武王之衆奉義伐罪勇氣自倍耳吾故曰武王之前徒倒戈也此亦何害於武成乎或曰孟子不信血流漂杵何也曰孟子欲明仁者之無敵故抑揚其詞以厲世主耳如曰可使制挺以撻秦楚之堅甲利兵夫自有兵以來未有制挺而可施於行陳亦得意忘言可矣不然幾何不為宋襄之仁義也哉洪範洛書辨洪範大法也其類有九謂之九疇自禹敘之自箕子陳之於洛書無當也夫惟天生民惟君代天經綸參贊其道不可一端盡也故約之為九類也分之則九合之則一猶中庸所謂九經云爾説者謂禹平水土神龜負書而出洛其文戴九履一左三右七二四為肩六八為足而五居中有自一至九之數故禹敘洪範起五行終福極亦有自一至九之數夫不要其道之符而徒取其數之合非通方之論也試案之書一三五七九皆白其文陽之精也竒也二四六八皆黑其文隂之精也偶也易有隂陽竒偶取之誠是矣今一曰五行五行果盡竒乎二曰五事五事果盡偶乎三曰八政五曰皇極七曰稽疑九曰福極不可謂之竒四曰五紀六曰三德八曰庶徴不可謂之偶也夫古之聖人雖甚神智必有藉手以發其聰明故設璣衡而厯數可推考山川而疏導可别今於洛書之一何以知其為五行於二何以知其為五事遞而至於九也何以知其為五福六極或有餘於數或不足於數或併其數而無之此何以故也漢儒各以臆度之劉歆以為五行五事八政五紀皇極三德稽疑庶徵五福六極二十字龜背所有劉向以為敬用農用協用建用乂用明用念用嚮用威用合五行以至六極三十八字亦龜背所有漢書五行志以為自初一曰五行至威用六極六十五字悉龜背所有如此則洛書已有文字矣而所謂戴九履一云云者又何以故也豈有二洛書耶劉氏父子説已不一是皆以臆度之者也嘗考之繫辭傳曰天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之語伏羲之作易也故四曰聖人皆指伏羲四曰則之效之象之則之皆言作易豈以三聖人皆為伏羲而末一聖人兼乎禹也又豈以則之效之象之為作易而末以則之兼敘疇也是洛書洪範之事經未有其説矣惟中候及諸緯多言黃帝堯舜禹湯文武受圖書之事緯候起於哀平蓋諂諛附會者之偽作不足信也明矣然則天何不畀鯀而錫禹耶曰唐虞之世洪水為災上下咨嗟民物昏墊鯀也方命圮族績用弗成雖欲議道安所議之帝之所以震怒也禹也隨山刋木四載是乘地平天成紀綱迭著天之所以錫命也錫之為義亦仲虺所謂錫王勇智魯頌錫公純嘏云爾豈必洛有書書有文文有九而授之禹然後謂天錫耶噫洪範大法也君天下者不能一日離也禹嘗屢陳之矣曰金木水火土穀非五行耶曰克艱臣后非敬用五事耶曰正德利用厚生非農用八政耶曰民棄不保天降之罰非協用五紀耶曰安汝止惟幾惟康非建用皇極耶曰敷納明試非乂用三德耶曰枚卜功臣非明用稽疑耶曰吉凶影響非念用庶徵耶曰董之勸之非嚮用五福威用六極耶自昔儒者見武王之訪箕子之陳以為宇宙間大事必欲附之天苞地符以神其説甚矣其不知彝倫為常道而徒欲語怪以駭世也我朝王子充名緯嘗辨之矣愚又簡捷其旨以俟後世若夫圖書作易之詳也已於伏羲圖贊著之矣惟天陰騭下民相協厥居我不知其彝倫攸敘治道必天人參也惟天愛民故默定下民於冥冥之中矣君則相助上天和協其民而使之得所必有常理次序而我不知此所以訪於箕子也孔傳曰天不言而默定下民是助合其居使有常生之資如此則專言天而若無與於君然者豈武王發問之意乎蔡注因之謂天安定其民輔相保合其居止誤矣惟王肅以陰騭下民為天事以相協厥居為民事言天默定下民與之五常之性王者當助天和合其居所行天之性是問承天順民何所由也肅蓋得經之旨矣曰休徵曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徵曰狂恆雨若曰僭恆暘若曰豫恆燠若曰急恆寒若曰蒙恆風若和氣致祥乖氣致異自古記之矣故洪範以五事配庶徵謂五事之修則心和氣和天地之和應之雨暘燠寒風未有不時者也五事不修則心氣不和天地之逆氣應之雨暘燠寒風未有不恆者也故災異不作五事之修日不敢廢災異間作則五事之修尤兢兢焉何者職在於奉天而君道易闕也故肅乂哲謀聖狂僭豫急蒙雨暘燠寒風分之若各有屬統之總惟修德此禹箕設教意也若曰雨不時而修肅暘不時而修乂燠寒風不時而修哲謀聖也則拘滯破碎非所以順陰陽而消沴變矣故春秋著災異而不著事應不欲其以人之意妄有所推測於天惟欲其修人之事而默挽回夫天意也其旨深矣漢儒董仲舒劉向歆眭孟京房谷永李尋輩各據春秋推言災變或一災而三四其説班固集之為五行志事煩而無緒言雜而不經不足裨國體而贊善政矣善乎賈誼之言曰見祥而為不可者祥反為妖見妖而迎以德者妖反為福斯可與語洪範春秋也歟曰王省惟歲蘇子瞻曰自此以下至則以風雨皆五紀之文簡編脫誤是以在此其文當在五曰厯數之後蘇言是也歲月日時無易百穀用成乂用明俊民用章家用平康歲月日時無易以人事言則王行王之職卿士行卿士之職師尹行師尹之職也以天時言則春宜溫而溫夏宜熱而熱秋宜涼而涼冬宜冷而冷也然四時之得序實由君臣之得職如此則時和歲豐治理彰明俊傑在位黎庶樂生是謂天下國家無窮之福也使其反是禍又可勝言哉庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨星有好民亦有好故日月之行則有冬夏政之經也月之從星則以風雨政之權也或問何以為政之權曰均之風雨也來得其序則祥來失其序則殃均之民好也從得其道則吉從失其道則凶此其中不無斟酌去取之宜弗容一槩徇也故衣食孝弟民之好也從之而民悅則從之怠惰驕淫亦民之好也從之而民非弗悅則矯之何者約其性情而歸之禮義所以大順其天衷而納之皇極也故曰政之權焉噫洪範略其詞而不極其意垂教之旨深矣五皇極皇建其有極惟時厥庶民于汝極錫汝保極凡厥庶民無有淫朋人無有比德惟皇作極凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之時人斯其惟皇之極無虐煢獨而畏高明人之有能有為使羞其行而邦其昌無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極曰皇極之敷言是彝是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒九五福一曰壽二曰富三曰康寧四曰攸好德五曰考終命六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱斂時五福用敷錫厥庶民凡厥正人既富方穀汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎而康而色曰豫攸好德汝則錫之福愚按洪邁曰洪範簡編脫誤多失其先後之次五皇極之中有雜九五福之文者如斂時五福用敷錫厥庶民凡厥正人既富方穀汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎而康而色曰豫攸好德汝則錫之福是也今考之似是愚又疑惟辟作福至民用僭忒似是五皇極之文以其文字錯雜因録五九二疇以俟觀者福極之後綴此數語見富之為福以其有受教之資也見好德之為福以其有受福之本也意殊可玩洪氏之卓見哉公乃自以為功愚讀金縢而知天人之交相動也克商未久武王遘疾周公慮盛業之不終求以身代卜而并吉翼日王瘳人動天也諸叔流言公避居東罪人既得成王讀鴟梟之詩而猶未悟風雷交變發金縢之册以白周公所以事先王之心天動人也誠無弗格精無弗通匹夫匹婦亦常有之不足疑矣然册祝之詞曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責於天以旦代某之身乃命于帝庭敷佑四方用能定爾子孫于下地四方之民罔不祗畏嗚呼無墜天之降寶命我先王亦永有依歸古今馴雅孰過於是乃有多材多藝能事鬼神之語近於謔又有爾不許我我乃屏璧與圭之語近於謾恐非周公之舊厄於煨燼不可得而考矣取其極論天人之際區區術數曷用哉曷用哉王曰猷猷孔傳釋為道蘇傳釋為謀蔡注釋為發語詞然謀為妥多士多方之猷皆此例也弗弔弔孔讀的其義至也謂其道不至故天降凶害蘇蔡讀釣其義恤也謂不恤於天故降割於我然恤義長多士君奭之弗弔皆此例也已豫惟小子已孔傳云發端嘆辭也蔡注云承上語詞已而有不能己之意蘇傳直云已矣蘇為是康誥洛誥之已亦此例也寧王遺我大寶龜大誥寧王自漢唐來皆以為文王東坡曰武王以其克殷寧天下也下文曰乃寧考知其為武王是矣至於前寧人則謂武王之舊臣非也愚謂通篇曰前人曰寧人皆指武王也可曰前人獨不可曰前寧人乎可曰前寧人獨不可曰寧人乎猶今人稱其考或曰失考或曰先君或曰先人有官者或曰先大夫或曰先將軍有諡者或曰先某某公其義一也即命曰有大艱于西土西土人亦不靜越兹蠢殷小腆誕敢紀其敘天降威知我國有疵民不康曰豫復反鄙我周邦今蠢今翼日民獻有十夫豫翼以于敉寧武圖功我有大事休朕卜并吉愚謂此皆命卜之詞以龜能紹天之明故武庚作亂即命曰亂作於東而大艱及於西東土人固不靜西土人亦不靜越兹蠢者誰乎殷小腆也小腆猶不腆誕敢紀其既亡之緒此天降之威也彼知我國有三叔之疵曰豫欲復其故物反鄙邑我周邦今遂蠢然動矣我明日欲征之非賢人莫與共功我民之賢者有十夫豫藉為輔翼以往冀其撫循武王所圖之功此國之大事我其休乎乃卜三龜朕卜并吉勝可知矣故以卜吉告庶邦而與之東征舊説以大艱于西土為前卜以卜并吉為後卜以今翼日為今蠢之明日以民獻十夫為自四國來投者意間斷而不聨不可讀也越豫小子考翼此篇凡二考翼舊説不同愚謂考翼父也詩云貽厥孫謀以燕翼子是其義也故前章曰民不靜亦惟在王宫邦君室越豫小子考翼豫小子成王自稱考翼武王也蓋庶邦君所以艱大其事意以三叔不睦於京師禍之所由興武王付監於三叔亂之所由始或宜以情親援解之或宜以文告漸平之故曰不可征非謂任其自亂付之不聞也至下章以作室治田為喻厥考翼之義益明矣孔傳解前考翼為敬成周道後為其父敬事創業東坡解前為考德敬事後為父雖敬其事而子不繼蔡注解前為父老敬事者後為父敬事者也以一考翼而彼此異解義似未暢故詳列之以俟後之君子康誥康誥一篇成王封康叔而誥之也書序云成王既伐管叔蔡叔以殷餘民封康叔作康誥史記衛世家武王崩成王少武庚叛周公興師殺武庚及管叔放蔡叔以殷餘民封康叔為衛君後之言康叔受封者實本諸此然誥之辭曰朕其弟又曰惟乃丕顯考文王又曰乃寡兄朂皆武王言非成王言也或謂周公雖以王命命康叔而其實訓誥皆周公之言此又非也夫王朝有體而典章不可雜周公既稱王以命之矣安得以己之稱謂厠於其中而且為武王遜也是康叔之封不在成王之世明矣使其在成王之世而無一語及武王豈武王不足法歟蔡注辨之已詳愚謂經有明文即序與史記可略之矣弘于天荀子富國篇引書曰𢎞覆乎天若德裕乃身此似脫一覆字有覆字於文甚順蓋煨燼之餘簡編錯脫一二字復落不能保其必無姑存之以備參考或讀𢎞于天若為句謂大順天也外事汝陳時臬司外事與已事為對凡愼刑之事屬於康叔者已詳告之矣其頒之人者則又告之曰外事汝惟陳是法於有司使其師是殷罰之有倫者用之與下汝陳時臬事相應司者用刑之人事者有司之事殷彛即殷罰之有倫殷罰有倫即義刑義殺非有二也蓋殷彝者湯之舊法非紂之虐刑也故曰乃反商政政由舊惟弔兹不于我政人得罪天惟與我民彝大泯亂曰乃其速由文王作罰刑兹無赦商受之世政散民頑人倫泯滅久矣故武王命康叔惓惓於此弔讀如弔民代罪之弔哀之也夫民而至於慈孝友恭之不克與禽獸何異兹固民之罪然率之弗先教之弗謹實為政者之罪也故政人者引以為罪一民不孝曰我之愆一民不弟曰我之過由是上行下效起陷溺之民而登之倫理新民之首事也不然天則民彝已大泯亂乃曰民之失道至是不可一日使生速由文王作罰刑兹無赦亂其政急其刑是豈知文王之意哉孔子為魯司寇有父子訟者同狴執之既而請正遂赦之用此道也曾子曰上失其道民散久矣如得其情則哀矜而勿喜無我殄享殄與不汝瑕殄之殄相應謂無棄絶我言則可以享有國土酒誥酒誥一篇武王以酒禁命康叔也書序謂成王封康叔作康誥酒誥梓材今觀酒誥之詞曰乃穆考文王又曰文王誥教小子又曰尚克用文王教不腆于酒故我至于今克受殷之命又曰汝典聽朕毖是武王之世康叔業已封衛專責之戒飲以變國俗未嘗有武庚之叛也及武庚叛周公誅之或以其地盡統諸康叔則未可知故讀酒誥而康誥益無疑矣説者謂伏生初得壁藏書併序共二十九篇序之來久矣然若康誥酒誥乃與經反餘亦不見其奧妙竟不知作之者誰也有正有事無彝酒正如孝友睦姻任恤之類事如士農工商分業之類遵其義盡其職則自不湎于酒矣所謂不敢暇逸其敢崇飲乎惟正事之教既廢而沉酗之禍漸生易曰正其本萬事理此之謂也惟土物愛厥心臧聰聽祖考之彝訓越小大德小子惟一土物者土之所生指五穀言蓋耗損五穀莫甚於酒愛土物則不愛酒不愛酒則其心善其心善則聞稼穡艱難之言而精神孚契故不徒曰聽而曰聰聽也夫自其不腆于酒也孰不謂尋常之細行曲謹乎然令德令儀罔淫罔佚內之安祖考外之歸皇極恆於斯也所謂大德曷以加兹故曰越小大德小子惟一美矣哉文王之善教也詩云肆成人有德小子有造爾大克羞耉惟君爾乃飲食醉飽此教妹土之臣也君主也言爾大能養一國之老其心專主於斯是真能養老而不為虛文以美觀聽者爾即飲食醉飽奚不可之有詩曰食之飲之君之宗之此之謂也上為民言則耕賈所以養父母父母慶自洗腆致用酒此為官言其能養父母可知矣故以養老為主苟一國之中無凍餒之老則飲食燕樂民歌舞之矣嗟夫酒以成禮人情所必不能廢者也故戒其無彝無腆無湎聖人之嚴也祭祀則飲養親則飲養老則飲聖人之達也旨哉淳于髠之論酒乎曰酒極則亂樂極則淫不亂不淫所謂德將無醉也已或曰羞進也耉老成人也臣能大進老成人念念在於君矣則可以飲食醉飽詩所謂退食委蛇易所謂飲食衎衎也丕惟曰能長自省已作考中德庶幾能享祖考矣乃可於其間用逸介間也夫不作德固非作德而不稽諸中亦非也中德者剛克柔克而合諸正之謂如是則其祖考歆之矣即飲食燕樂神其吐之乎周官所謂作德日休無逸所謂無逸乃逸也梓材梓材一篇脫簡最多脈理不貫惟應斷章讀之知其可知闕其不可知不必強為之解也其汝若恆越曰一節尤為難通洛誥愚按洛誥文詞奧隱意義渾深先儒皆依文訓解各爛然可觀然血脈微有不貫次序未免牽合竊疑尚有脫簡於其間乎僭以意更置之倣蔡氏考定武成之義夫蔡氏所定後儒多非之愚亦不敢以為是何者人各有見也不以為是而又效之何也心既有疑用以便一時之習讀云爾敢謂人之見猶吾見乎周公拜手稽首曰朕復子明辟王如弗敢及天基命定命豫乃胤保大相東土其基作民明辟豫惟乙卯朝至于洛師我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻來以圖及獻卜王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來來視豫卜休恆吉我二人其貞公其以豫萬億年敬天之休拜手稽首誨言此追敘作洛獻卜之事周公曰王肇稱殷禮祀于新邑咸秩無文豫齊百工伻從王于周豫惟曰庶有事今王即命曰記功宗以功作元祀惟命曰汝受命篤弼丕視功載乃汝其悉自教工孺子其朋孺子其朋其往無若火始焰焰厥攸灼敘弗其絶厥若彝及撫事如豫惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭此言洛邑既成周公從王往洛之事戊辰王在新邑蒸祭歲文王騂牛一武王騂牛一王命作册逸祝册惟告周公其後王賓殺禋咸格王入太室祼此言成王在洛之事王若曰公明保豫沖子公稱丕顯德以豫小子揚文武烈奉答天命和恆四方民居師惇宗將禮稱秩元祀咸秩無文惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教豫沖子夙夜毖祀王曰公功棐迪篤罔不若時王曰公豫小子其退即辟于周命公後四方迪亂未定于宗禮亦未克敉公功迪將其後監我士師工誕保文武受民亂為四輔王曰公定豫往已公功肅將祗歡公無困哉我惟無斁其康事公勿替刑四方其世享周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中乂萬邦咸休惟王有成績豫旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德此成王留公治洛公承王命之事公曰已汝惟沖子惟終汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮乃惟孺子頒朕不暇聽朕教汝于棐民彝汝乃是不蘉乃時惟不永哉篤敘乃正父罔不若豫不敢廢乃命汝往敬哉兹豫其明農哉彼裕我民無逺用戾此公誨成王分别諸侯及寬裕得民之事伻來毖殷乃命寧豫絶句以秬鬯二卣曰明禋拜手稽首休享豫不敢宿則禋于文王武王惠篤敘無有遘自疾萬年厭于乃德殷乃引考王伻殷乃承敘萬年其永觀朕子懷德此王既歸鎬使致秬鬯於公公用以祭併勉王終修其德之事王命周公後作册逸誥在十有二月惟周公誕保文武受命惟七年此史記册命之時併以公保命之實結之也惟命曰汝受命篤弼丕視功載乃汝其悉自教工孺子其朋孺子其朋謂王當即命曰記功宗以功作元祀此則公天下以論功不為比矣乃惟命曰汝受命篤弼汝指周公謂受命厚輔營洛之事今大視功作之籍乃汝其悉自教工即所謂用書命庶殷庶殷丕作者也是汝周公為功宗矣周公欲辭而不居故曰孺子其朋比乎奈何以作洛之功盡歸之我也公雖辭之成王實知之故下文曰公功棐迪篤公功肅將祗歡亦昔日風雷之所助也已其往無若火始焰焰厥攸灼敘弗其絶厥若彝其往謂自今以往當謹事之微不可縱也當率法之常不可變也知幾守典治洛之首事乎及撫事如豫惟以在周工往新邑夫人惟求舊器惟求新洛邑新邑不可以新進治之也故及今撫定洛邑如豫之意惟以在周工往新邑則張弛並用寬嚴相濟永有辭於後世矣此豫齊百工以從王之意也凡民惟曰不享惟事其爽侮乃惟孺子頒朕不暇聽朕教汝于棐民彝汝乃是不蘉乃時惟不永哉篤敘乃正父罔不若豫不敢廢乃命汝往敬哉世之盛也諸侯之奉上篤於禮及其衰也腆於幣故儀之多寡百辟之敬慢繫焉禮之敬慢人情之向背繇焉諸侯不敬天子則百官不敬諸侯下民亦不敬百官民彝之所以亂也豈可以不享為細故哉故民彝治則國祚靈長民彝亂則享國弗永矣乃惟孺子富於春秋其分别是哉頒别也孰為享孰為不享一一辨之若我則不暇矣我之以此教汝非為儀節之間實輔民彝之道也汝其聽之勉之不然無能久享天休矣正父者諸侯也古者謂諸侯為伯父伯舅故曰正父即百辟也篤敘乃正父罔不若豫所言儀皆及物而無有不享者夫孰敢廢命而不遵乎汝往其敬兹不可忽也已兹豫其明農哉愚謂明農非致政也周家王業起於稼穡公欲專明農事以養萬民以佐邦國之盛治云耳豈其退休田野躬秉表耜以耕乎唐孔氏引伏生書傳稱禮致仕之臣教於州里大夫為太師士為少師朝夕坐於門孰而教出入之子弟是教農人以義周公所謂明農者此也噫淺乎論周公矣按成王八歲即位及此七年猶未壯也周公安忍舍之况其時召公欲去周公留之甚惓惓也豈重責人以輔少主而輕去國以就耕農乎必不然矣况在位則澤及四裔居野則教乎州里公必權其大小矣成王命公留後以治洛邑化頑民經有其文而君陳畢命俱詳之矣故曰明農非致政也惟三月哉生魄周公初基作新大邑于東國洛四方民大和會侯甸男邦采衛百工播民和見士于周周公咸勤乃洪大誥治此章舊錯在康誥蘇氏曰當在洛誥周公拜手稽首之前愚謂當在多士之首此統言洛邑既成士見于周故於大誥治之下繼之曰惟三月周公初于新邑洛用告商王士文義似貫豫惟時其遷居西爾非我一人奉德不康寧時惟天命無違朕不敢有後無我怨惟爾知惟殷先人有册有典殷革夏命今爾其曰夏迪簡在王庭有服在百僚豫一人惟聽用德肆豫敢求爾于天邑商豫惟率肆矜爾非豫罪時惟天命遷居爾西者非我奉德不康寧爾是惟天命不可違朕奉天不敢有後耳蓋宜遷而速遷天命也豈可怨我乎故考之册典殷革夏命亦孰非天命今爾其曰夏士迪簡在商庭與服在百僚亦欲我之用爾也夫夏士之用商惟其德耳豫一人惟德是用今爾無度而叛亂豫敢求爾于商邑而用之乎豫惟循湯故事而矜赦爾則已幸矣非我不用爾之罪是惟天命蓋可用而用天命也不可用而不用亦天命也易曰君子遏惡揚善順天休命爰暨小人作其在高宗時舊勞于外爰暨小人作句其即位乃或亮隂云云其在祖甲不義惟王舊為小人作句其即位爰知小人之依云云此其詞義至明暢也自孔安國以爰暨小人為句作其即位為句至今因之弗改夫小人細民也作耕作也暨小人作則知稼穡之艱難矣今曰爰暨小人則所暨者何事耶且曰其即位義無所欠曰起其即位詞亦少艱矣按傳武丁父小乙使之久居民間勞是稼穡與小人出入同事意可識矣愚故具論之以俟後之讀者嘉靖殷邦蔡仲默注殷高宗之嘉靖也曰漢文帝與民休息謂之靖則可謂之嘉則不可愚於是深歎其失言也嗟嗟文帝豈易及哉愚讀虞夏商周之書自童年以至皓首無一日不擊節稱快矣外此讀漢文帝詔心爽神怡若登春臺之上而遊華胥之圃也句句言言流於肺腑此與王謨帝誥何異用德以化俗損已以益人屢賜田租之半至十三年盡除租稅而不收賜天下孤寡布帛絮各有數八十以上賜粟人一石肉二十斤酒五斗九十以上賜帛人二匹絮三斤孝者帛人五匹悌者力田二匹斯民何幸而生於斯世蓋千載一時也嘗曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽于死亡而莫之省憂為民父母將何如其議所以賑貸之又曰天下治亂在豫一人其悉思朕之過失及知見之所不及丐以啓告朕及舉賢良方正能直言極諌者以匡朕之不逮又曰祠官祝釐皆歸福於朕躬不為百姓朕甚愧之夫以朕之不德而專鄉獨美其福百姓不與焉是重吾不德也其令祠官致敬無有所祈由是觀之經稱中宗治民祗懼不敢荒寧髙宗至于小大無時或怨祖甲能保惠于庶民不敢侮鰥寡皆文所優為也經又謂兹四人迪哲厥或告之曰小人怨汝詈汝則皇自敬德厥愆曰朕之愆允若時不啻不敢含怒今帝之言曰民或祝詛上以相約而後相謾吏以為大逆其有他言吏又以為誹謗此細民之愚無知抵死朕甚不取自今以來有犯此者勿聽治所謂小民怨詈引以為愆也是耶非耶蘇子瞻亦嘗云西漢道德比之殷猶碔玞之與美玉也是皆厚尊往古而輕黜近代實世儒之見錮之也或謂三代禮樂教化蔚然於安居樂業之中漢文不能故不相及此又不然盛漢之世人人孝弟力田海內殷富興於禮義斷獄至於數百即比屋可封何以加此孔子曰民可使由之不可使知之如必人人知道則才難不歎於周世矣夏自禹啓所傳幾何太康逸豫民即不忍距之于河周自成康之後昭王南征不復儒者不考其治亂之倐然而猥云禮樂教化至謂古今邈不相及豈達士之識哉或謂文帝有鄧通之悅愼夫人之嬖是以逺遜於古此又非也夫論玉者論其精潤不於其微瑕論人者論其大德不於其小過故孔子述詩書於古人多揚其善而掩其惡後之作史者必抉剔其微細以遺棄其大端古今不相及亦正坐此不然昵典祀踈孝已周公不以是而貶高宗之賢也豈無意哉其在祖甲虞夏商周之書皆史也無逸作於周公信史哉無逸之言曰其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年又曰自殷王中宗及高宗及祖甲及我周文王兹四人迪哲夫以商周之世數其四王以訓孺子不浮不誣可知也已國語乃云帝甲亂之七代而殞及讀殷本紀帝武丁崩子帝祖庚立帝祖庚崩弟祖甲立是為帝甲帝甲淫亂殷治衰何其與無逸矛盾也太史公曰余以頌次契之事自成湯來采於書詩豈論敘祖甲采之國語而未及無逸歟孔安國以祖甲為太甲誤矣鄭玄云祖甲武丁子帝甲也有兄祖庚賢武丁欲廢兄立弟祖甲以此為不義逃於民間故曰不義惟王玄之言意與經合故君子據經而國語史記不足信矣詳在蔡氏注中不具論君奭君奭一篇孔傳以周公言已留輔王朝之意蔡注謂周公留召公也蘇傳兼此二義愚按序云召公為保周公為師相成王為左右召公不悅周公作君奭所謂不悅者不樂居位而欲去不以寵利居成功也周公以成王初政老成大臣未可遽去故留之首言天命難保以及商周之興皆賢臣是賴又曰前人敷乃心命汝明朂末言民德惟不厥終恐終王業之難皆勉留召公之言蔡注確矣豫往暨汝奭其濟小子同未在位誕無我責收罔勗不及耉造德不降我則鳴鳥不聞矧曰其有能格小子即小子旦周公自謂也言我同爾未在位則濟不濟誰其收功責我乎今既在師保之位不共勉力則不及濟矣又安得辭其責而委之誰也故耉能造德者也不共劼力則德不降我則鳴鳥不聞嚶嚶之和不及黃鳥矣矧曰格于皇天若伊尹輩乎鳴鳥不指鳴鳯詩曰伐木丁丁鳥鳴嚶嚶相彼鳥矣猶求友聲矧伊人矣不求友生是其義也若鳴鳯最難聞嘗一鳴岐山周人以為文王受命之符豈可以尋常道乎卷阿之咏蓋以喻君臣非實言鳳也多方蘇氏曰大誥康誥酒誥梓材召誥洛誥多士多方八篇雖所誥不一然大略以殷人不服周而作也愚謂大誥等六篇各有所指惟多士多方則詳誥庶殷使之思商周之興敗而殄絶其叛亂之萌也夫誅紂而封武庚於故都去豐鎬逺徒恃三監監之此其勢不能無叛及叛而周公誅之徙其頑民於成周密邇王城而教誨之不得不詳亦其時宜爾也蘇氏又曰豫乃今知湯以下七王之德深矣方殷之虐人如在膏火中歸周如流不暇念先王之德及天下粗定人自膏火中出即念殷先七王如父母雖以武王周公之聖相繼撫之而莫能禦也愚竊以為不然夫天下初定法令未孚而紂素所崇信淵藪之姦宄醜類往往錯處於民間故紛紛而慮亂藉藉而思變皆紂之餘黨為之非天下之人思商而叛周也後儒又為之説曰周之頑民殷之忠臣愈益過矣夫周之忠臣宜莫若微子箕子祖伊微子即封於宋箕子陳範於王祖伊奔告戡黎初無一語咎周也豈以三子為忘殷乎三子非忘殷則叛者非忠臣執是可以論商周之際矣簡代夏作民主孔傳云乃惟成湯能用汝衆方之賢大代夏政為天下民主孔頴達云言天位之重湯能代之謂之大代夏也蔡注以爾多方簡為句誤矣惟狂克念作聖愚按孟子曰人皆可以為堯舜經曰惟狂克念作聖孰為切曰經之意切矣蓋古之聖人精神意氣力量𢎞大故能舉乾坤而負荷之合古今而繩紐之也今有局促纎縮之人即自力為善僅止於曲謹何者束於器也惟肆蕩跅弛之士一或向道即卓越尋常何者不窘於俗也是故敢於為惡者亦敢於為善敢於為大惡者亦敢於為大善患無其意耳自古敗君亂相其才曷嘗不大卒之罹禍殃而不可解亦不善用其才而已矣然則念之一言其可忽乎哉其可忽乎哉謀面用丕訓德則乃宅人兹乃三宅無義民桀德惟乃弗作往任是惟暴德罔後亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德嗚呼其在受德暋惟羞刑暴德之人同于厥邦乃惟庶習逸德之人同于厥政帝欽罰之乃伻我有夏式商受命奄甸萬姓亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯謀面用者如堯舜之用人皆面謀諸朝而公用之故得人獨盛丕訓德者明言其人有某德足以堪某事先已訓釋詳審而後用之如此宅人則宅事宅牧宅準皆有德之士不見有義民矣何者白以黑顯正以邪顯三宅純乎君子又安見有君子乎惟桀弗能法祖不作德而作虐故其所往任罔非暴德遂已殄滅無後矣越至成湯得統於禹也既陟帝位大治上帝之光命乃用宅事宅牧宅準三者皆能即其宅也事者事牧者牧準者準俱無忝厥職矣其道何由曰惟有俊德乃可居位湯擇三有俊能即得其俊以三俊而居三宅何患職之不舉乎蓋三俊者三宅之人克即俊者克即宅之本也故加一曰字推本言之非二事矣嚴敬也惟思也成湯敬思大法故克用三宅三俊所以協和商邑而顯德四方也受弗法祖所任惟暴德逸德之人天之所以殄商而興周矣亦越文王武王其得統於湯哉蓋民非官不治官非賢弗稱湯之用三有宅何心也欲為民得官也用三有俊何心也欲為官得人也文武皆克知而灼見之矣故克用三宅三俊上之敬事上帝而上帝歆享下之立民長伯而下民悅服此見夏后商周相授守一道也愚按立政一篇專重任人故大而常伯常任準人小而綴衣虎賁以至趣馬小尹之類一一敘之至於庶獄庶慎謂文王罔敢知于兹儒者多以三俊為用賢三宅為去惡謂夏禹先言得賢後言去惡成湯文武先言去惡後言得賢愚竊考其文意不然故標其大略如此立政任人準夫牧作三事此言文武之立政也以常任準人常牧作三事是立政之統體而用三宅立政之實事也故下文繼自今我其立政句立事準人牧夫句又下文亦越我周文王立政句立事牧夫準人句則意義朗然孔傳曰立政大臣立事小臣及準人牧夫是四臣也於此篇三俊之義似混矣不知言立政則三宅三俊已在其中故曰繼自今立政繼自今後王立政皆此義也周官愚讀周官一篇歎其設官分職要而有體時巡朝覲簡而不煩至其統命百官切實而可見諸施行懇惻而無長語也非周公孰能作之乎昔虞之命官也總之曰咨汝二十有二人欽哉兹亦總之曰三事暨大夫敬爾有官誠帝王一揆矣雖其五載巡狩三載考績微有不同然三考黜陟幽明與六年大明黜陟者不異也周家之經綸制度可以推而盡之矣沿此以治天下有餘也乃蔡仲默氏致疑於周官周禮之不同不知周禮非尚古之書固不足援以為據也何以言之聖王之治必修德以為天下先故三公論道經邦三孤弼豫一人此不可一日缺者周禮不首録公孤失其本矣冡宰雖列於六卿五卿皆其所進退也故邦教邦禮之不修則簡其司徒簡其宗伯邦政邦禁邦土之不修則簡其司馬簡其司冦司空故曰掌邦治均四海也今周禮太宰之職掌建邦之六典曰治典教典禮典政典刑典事典何其侵五卿之職也且八法之內有官刑官計八則之內有賦貢田役冡宰之煩若是何以照臨百官而佐王辨賢能糾百職也冬官固不存矣而地官宗伯司馬司寇之相糾混者不可一二數豈所以責成官守之意乎夫民之所重者食國之所寶者財故躬行節儉自天子始今曰惟王及后世子之膳不會惟王及后之膳禽不會惟王及后之服不會惟王之裘與其皮事不會何以訓子孫儉德也夫紂之所以亡非以湎于酒乎故酒誥無逸重為惓惓欲使成王畏相不敢暇逸而崇飲也今置酒正掌酒之政令辨五齊之名三酒之物以共王之四飲三酒之饌及后世子之飲曰歲終則會惟王及后之飲酒不會以酒式誅賞是使儀狄常在左右而杜康不離於側也且違酒式而誅與殺熊蹯不熟者奚異乎吾聞民可使由不可使知以其愚也今冡宰於正月之吉始和布治於邦國都鄙乃懸治象之法于象魏使萬民觀治象挾日而斂之司徒布教司馬布政司寇布刑亦皆懸之正月之吉而斂之挾日之後吾恐萬民之不能悉識也逺者阻於道路近者厭於耳目非實政之所宜先矣西旅底貢厥獒太保用訓于王曰不役耳目百度惟貞不寶逺物則逺人格所以昭王度而敷文德也今曰凡式貢之餘則以共玩好之用又有山師以致其山珍異之物有川師以致其川珍異之物又曰九州之外謂之蕃國世一見各以其所貴寶為摯非所以令四夷見也古者天子理陽道后治隂德天子聽外治后聽內職所以别嫌疑慎風化也今置內宰以治王內之政令大祭祀后祼獻則贊凡建國佐后立市歲終佐后受獻功者比其大小與其粗良而賞罰之不幾於亂男女之别乎六年五服一朝周官畫一之制今曰侯服歲一見貢祀物甸服二歲一見貢嬪物男服三歲一見貢器物采服四歲一見貢服物衛服五歲一見貢材物要服六歲一見貢貨物則其制紊矣列爵惟五分土惟三故公侯百里伯七十里子男五十里周之定制也今曰諸公之地方五百里諸侯四百里諸伯三百里諸子二百里諸男百里此春秋戰國併吞者有之豈封建之本初乎古者樹后王君公承以大夫師長以至庶人之役於官皆以治民故省一官民之福多一官民之殘也周禮設官何其猥瑣而冗亂乎既有甸師又有獸人漁人鱉人臘人既有醫師又有食醫疾醫痬醫獸醫既有漿人又有籩人醢人醯人鹽人既有內司服又有縫人染人追師屨人推此數之莫能更僕豈皆不可以兼攝乎凡此皆非周公意也可一恆人而辨之也昔者孟子之言曰諸侯惡其害己也而皆去其籍是自孟子之時而周禮不存矣至漢武帝河間王得而獻之徒藏之祕府劉歆始深好之以為周公致太平之書鄭玄又注之顯於世林孝存詆以為黷亂不經何休亦以戰國隂謀之書目之嗣是諸儒疑信相半未能決其左袒也愚詳其書文字頗古度數頗備亦秦末漢初之人所作後世莫及也其存周之迹十之二三其雜秦之制十之四五然破碎繁雜決不可以治天下國家設舉而行之官日奔走而匪寧民日煩苛而匪息亡無日矣始缺冬官河間獻王以考工記補之俞廷椿氏謂冬官雜在五官中復割裂而編輯之以為全書亦竟何益矣蓋讀其文雖渾雅可觀措諸事實窒塞不達自漢至宋千四百年惟劉歆蘇綽王安石鋭意行之皆破壞天下夫以三小人而信其書則其書可知也已故修齊治平其惟取信於周官則肄肄不違肄習也肄肄不違作一句讀言文武之於民既奠麗以安之又陳教以誨之民於是亹亹服習而不違故能達於殷邦而集大命孟子所謂民日遷善而不知為之者詩所謂古之人無斁譽髦斯士是也先儒率以則肄為句肄不違為句失其讀矣惟周文武誕受羑若羑若久費分解孔安國釋羑為道言文武大受天道而順之王肅亦曰羑道也孔頴達曰羑聲近猷故訓為道蘇子瞻曰羑羑里也文王出羑里之囚天命自是始順蔡仲默曰羑若或謂即下文厥若也羑厥或字有訛謬周堯弼曰按韻書羑善也若順也誕受羑若者蒙上文而言皇天改大邦殷之命惟周文武大受而善順之大受者見其極負荷之重也善順者見其有靈威之實也此皆以意為説耳愚按孔叢子論書篇曰文王疏附奔奏先後禦侮謂之四鄰以免乎牖里之害又居衛篇子思曰文王困於牖里作周易戰國䇿趙希寫曰昔者文王拘於牖里而武王羈於玉門又魯仲連曰文王聞之喟然而歎故拘於牖里之庫後漢書引語曰文王牖里閎散懷金史弼遭患義夫懷寶是牖羑古通用牖明謂受命明若以其克恤西土也西土王業所基故本而言之用端命于上帝皇天用訓厥道付畀四方用端命于上帝皇天句言君聖臣良用受正命于天帝用能以道訓四方故天付畀以天下旨似直截而明朗矣舊説以用端命於上帝句皇天用訓厥道句謂上天用順文武之道而付之以四方理亦可通但釋訓為順似有未妥况上帝皇天豈可點斷湯誥謂告于上天神后魯論告于皇皇后帝是其證也王釋冕反喪服宋儒孫覺作書解以康王喪服見諸侯為非禮蘇子瞻著論又最詳悉謂冠禮可以喪服行受顧命見諸侯獨不可喪服乎太保使太史奉册授王於次諸侯入哭于路寢而見王于次王惟喪服受教戒諫哭踊答拜此一説也周堯弼辨之以受顧命主大位乃非常大禮非區區冠儀可比故君薨世子生者大祝猶得裨冕奠幣以告於神生子而告且不可以凶服而况非常大禮乎又成王嗣位周公以王室懿親猶遭流言之變幾危宗社召公畢公為國元老而慮及此故權一時之宜正君臣之分而以冕服朝諸侯此諸儒之成議不可廢也此亦一説也愚謂分有尊卑禮有經權故人臣不敢以喪服見天子何者君尊也以君而視祖祖又尊也伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在夫未有見祖而不易服易服見祖併見羣臣太甲嘗行之矣又若康王嗣立果見危疑之際二公俾其亟見諸侯以繫天下之心則雖變禮而不失其常者矣且殷周皆用亮隂之制三年之憂一日之吉未為失禮之甚顧其時何如耳然愚少讀顧命至逆子釗于南門之外則廢書而歎曰太子之事君也朝焉夕焉生則視膳病則視藥死則視飯含成王之崩康王不在側乎夫既其在側又奚為南門之外彼其時天地崩坼劈踊哭泣之不暇而暇為文乎又胡為待太保之命以干戈虎賁而迎之以延入室也私心抱此無可與語及稍視傳注乃所以褒嘉此事者極其贊美於豫心終不謂然及讀子瞻之論曰始死方殯孝子釋服離次出居路門之外受干戈虎賁之迎此何禮也漢宣帝以庶人入立故遣宗正太僕奉迎以顯異之康王元子也天下莫不知何用此紛紛也噫是先得我心之所同然矣故具述之以俟後之論禮論情者呂刑呂刑一篇序以為訓夏贖刑作也今反覆讀之嗟有苖思堯舜述三后示來嗣其惓勤懇切惟恐失於不經不辜將下傷民命而上違天和也故戒之勤戒之審戒之佞戒之獄貨惻怛哀矜之情洋溢於詔告肫肫然先王之法言孔子所為取也至於贖刑特其中之一事耳儒者訾之曰唐虞鞭朴方許其贖今穆王之法雖大辟亦免之矣不知贖也者贖其所矜疑也不疑何赦不赦何贖夫既疑矣當之以本罪忍乎故計所犯之重輕而酌鍰之多寡亦平允之一道也漢制蘇建出塞失軍贖為庶人太史公下蠶室家貧不足以自贖其亦呂刑之遺意乎故曰罰懲非死人極于病儒者又謂穆王巡遊無度財匱民勞至其末年為此一切權宜之術以斂民財此又揣摩之過也夫穆王欲以車轍馬迹遍天下彼一時也故讀祈招之詩傷哉其言之矣今此訓刑之作意其悔心之萌乎夫悔而念及於刑念刑而篤於敬懼此一時也實非斂民以自富者也故祗宫獲殁尚延共懿孝夷之緒有以也哉漢路溫舒謂獄者天下之大命獄吏深刻利人之死非憎人也自安之道在人之死悲矣悲矣夫然後知呂刑之言大有關於國體民瘼也或謂孔子録此以示戒豈其然豈其然王享國百年耄荒度作刑宜讀耄為句按周本紀穆王即位春秋已五十立五十五年崩故曰王享國百年耄蘇傳曰刑必老者制之以其更事而仁也耄荒度作刑者以耄年而大度作刑猶禹曰豫荒度土功罔有馨香德刑作一句讀夫刑天下之大命也聖人慎之上帝鑒之故刑而當罪罔有不辜則刑皆德也德刑惟馨帝佑之矣今苖民爰始淫為劓刵椓黥曰爰始見前未有也罔差有辭見曲直不分也故其民皆習於惡無有忠信惟以反覆詛盟為事是其腥穢之虐刑也豈非神人所共怒乎皇帝哀矜庶戮之不辜秦始皇初并天下令議帝號羣臣皆曰昔者五帝地方千里其外侯服夷服諸侯或朝或否天子不能制今陛下興義兵誅殘賊平定天下海內為郡縣法令由一統自上古以來未嘗有五帝所不及臣等謹與博士議曰古有天皇有地皇有泰皇泰皇最貴臣等冒死上尊號王為泰皇命為制令為詔天子自稱曰朕王曰去泰著皇采上古帝位號號曰皇帝他如議制曰可是皇帝之號自秦始也余讀呂刑皇帝哀矜庶戮之不辜曰所從來逺矣乃命重黎絶地天通國治聽人國亂聽神此常理也蓋國亂則法令不明賞罰不中矣無所措其手足矣無所控訴惟求之神神道日盛人道日衰時則瞽史巫覡又妄言禍福於其間民志昏惑不能自決將謂是非曲直官不足憑而利害死生惟神足恃由是山川土石之妖草木禽獸之怪亦乘釁而入人鬼混淆隂陽雜糅是之謂地天通也邪道既盛釁孽自作氷雹水旱山崩川竭之變無時無之是之謂上帝降格也格古讀閣與割同音故大誥降割與多士多方降格皆謂災也重黎何以治之乎重黎掌天地四時之官治厯授時勸民耕稼而又正祭祀之典去淫邪之祠則民盡力於本務自不分心於希冀尊鬼而不媚敬神而不祈故和氣集乖氣亡休徵臻咎徵逺是之謂絶地天通而罔有降格也故大義之明如日中天羣后及在下罔不明其所當明人道也常道也為己則明其當明為人則輔其當輔而天下皆得所即鰥寡孤獨孰有掩蓋之者乎此撥亂致治之大體不獨為有苖言也四方司政典獄非爾惟作天牧孔讀司政典獄句非爾惟作天牧句解曰主政典獄謂諸侯也非汝惟為天牧民乎理亦可通然非下一乎字作轉語意未明也宜讀四方司政句典獄非爾句惟作天牧句非爾者如康誥所謂非汝封刑人殺人無或刑人殺人是也不與於已為天牧民則監懲當矣其罰百鍰古者金銀銅鐵皆謂之金傳曰此所罰黃鐵黃鐵銅也鍰六兩千鍰三百七十五斤其價亦亷以疑故也疑而即赦之恐過輕故令其贖又曰閲實其罪則亦非縱矣古之贖皆用銅漢始改用黃金但少其斤兩令與銅相敵尚書疏衍卷四
