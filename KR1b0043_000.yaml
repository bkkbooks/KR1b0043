front:
  text: 欽定四庫全書經部二
  hash: sha256:0cc932f81e16f40609470aaa0474e8369dec60a220254d8de2f21651552b055d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0043_WYG_000-1a, image: WYG0064/WYG0064-0725a.png}
body:
  text: 尚書䟽衍目録書類卷一尚書攷古文辨引書證尚書評卷二虞書曰若稽古帝堯曰放勲分命羲仲女于時觀厥刑于二女納于大麓烈風雷雨弗迷禋于六宗輯五瑞如五器卒乃復象以典刑五刑有服陟方乃死舜生三十念兹在茲眀于五刑以弼五教負罪引慝曰若稽古臯陶曰允廸厥徳謨眀弼諧亦行有九徳亦言其人有徳乃言曰載采采日宣三徳予乗四載暨益奏庶鮮食以五采彰施于五色無若丹朱敖弼成五服卷三夏書商書三江既入震澤底定嶓冢導漾東流為漢至東為中江入于海導渭自鳥䑕同穴朔南暨聲教訖于四海威侮五行怠棄三正五子之歌成湯放桀于南巢惟有慙徳曰予恐來世以台為口實矧予之徳言足聼聞惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖爾惟徳罔小萬邦惟慶爾惟不徳罔大墜厥宗王徂桐宫居憂克終允徳克享天心受天眀命徳惟一動㒺不吉徳二三動罔不凶王若曰格汝衆無傲從康非予自荒兹徳惟汝含徳不惕予一人予若觀火予亦拙謀作乃逸遲任有言曰人惟求舊噐非求舊惟新予迓續乃命于天至髙后丕乃崇降弗祥各設中於乃心惟口起羞既乃遯于荒野入宅于河自河徂亳暨厥終㒺顯昔先正保衡作我先王乃曰予弗克俾厥后惟堯舜其心媿耻若撻于市一夫不獲則曰時予之辜說曰王人求多聞時惟建事西伯既戡黎今殷民乃攘竊神祗之犧牷牲用以容將食無災卷四周書惟十有三年春大㑹于孟津肆予小子以爾友邦冢君觀政于商惟受罔有悛心武成前徒倒戈攻于後以北血流漂杵洪範洛書辨惟天隂隲下民相協厥居我不知其彜倫攸叙曰休徴曰肅時雨若至䝉恒風若曰王省惟嵗嵗月日時無易百糓用成乂用明俊民用章家用平康庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨五皇極皇建其有極至民用僭忒九五福一曰夀二曰富至汝則錫之福公乃自以為功王曰猷弗弔已予惟小子寕王遺我大寳龜即命曰有大艱于西土至朕卜并吉越予小子考翼康誥𢎞于天外事汝陳時臬司惟弔兹不于我政人得罪天惟與我民彛大泯亂曰乃其速由文王作罰刑兹無赦無我殄享酒誥有正有事無彛酒惟土物愛厥心臧聰聽祖考之彛訓越小大徳小子惟一爾大克羞耉惟君爾乃飲食醉飽梓材洛誥惟命曰汝受命篤弼丕視功載乃汝其悉自教工孺子其朋孺子其朋其往無若火始燄燄厥攸灼叙弗其絶厥若彛及撫事如予惟以在周工往新邑凡民惟曰不享惟事其爽侮至汝往敬哉茲予其明農哉惟三月哉生魄周公初基作新大邑于東國洛四方民大和㑹侯甸男邦采衛百工播民和見士于周周公咸勤乃洪大誥治予惟時其遷居西爾至非予罪時惟天命爰暨小人作嘉靖殷邦其在祖甲君奭予往暨汝奭其濟小子同未在位誕無我責收罔朂不及耉造德不降我則鳴鳥不聞矧曰其有能格多方簡代夏作民主惟狂克念作聖謀面用丕訓徳則乃宅人至立民長伯立政任人凖夫牧作三事周官則肄肄不違惟周文武誕受羑若用端命于上帝皇天用訓厥道付畀四方王釋冕反喪服吕刑王享國百年耄荒度作刑罔有馨香徳刑皇帝哀矜庶戮之不辜乃命重黎絶地天通四方司政典獄非爾惟作天牧其罰百鍰臣等謹按尚書疏衍四卷明陳第撰第字季立連江人以諸生從軍官至薊鎮遊擊是書前有第自序稱少受尚書讀經不讀傳注口誦心維得其意於深思者頗多後乃參取古今注疏而以素得於深思者附著之然第學問淹博所著毛詩古音考屈宋古音義諸書皆援據該洽具有根柢其作是書雖其初不由訓詁入而實非師心臆斷以空言説經者比如論舜典五瑞五玉五器謂不得以周禮釋虞禮斥注疏家牽合之非其理確不可移論武成無錯簡洪範非龜文亦足破諸儒穿鑿附會之習惟篤信梅賾古文以朱子疑之為非於梅鷟尚書考異尚書譜二編排詆尤力葢今文古文之辨至閻若璩疏證始明自第以前如吳栻之書禆傳陳振孫之書説吳澄之書纂言歸有光之尚書敘録均不過推究於文字難易之間未能援引諸書得其確證梅鷟尚書考異雖多所釐訂頗勝前人而其尚書譜則蔓語枝詞徒為嫚罵亦不足以闗辨者之口第之堅持舊説葢由於此經師授受自漢代已别户分門各尊所聞亦聴其並存可矣乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀尚書䟽衍自序余少受尚書家庭讀經不讀傳註家大人責之曰傳註適經門户也不由門户安入堂室余時俯首對曰竊聞經者徑也門户堂室自具兒不肖欲思而得之不敢以先入之說錮靈府耳家大人黙然閱嵗詰以疑義余謬縷悉以對家大人曰是不無一隙之明顧鑿井而飲孰與寄汲之易易也又曰嗟爾豎子生海濵不及見當世眀經君子儻見當有悟其以語我然河清難待吾恐不及聞之乎余時惕息忍涕而已久之大人見背余猶堅守前説友朋聞而規之曰爾何忍違爾先公之治命使不帖然于九原也余小子流涕對曰非敢然也讀禮之暇亦嘗稍窺傳註大都眀顯易知者先儒交發之稍渉盤錯則置而弗講甚至句讀之間多有錯誤是讀不讀等也藉令余復因循鹵莾使尚古帝王之旨弗傳于世其罪不益重乎嗣是讀經愈專偶有所適未之携也復購一冊讀之篋中積至十餘冊無不句字磨滅且圈㸃批賛以寓鼓舞擊節之意枕上黙誦嘗不遺一字口誦心維得其義于深思者頗多若其掘井而不及泉則生質限之矣近因宋元諸儒疑古文偽作竊著辨論数篇因復取古今註䟽詳悉讀之意所是者摽之意未安者㣲釋之句讀未是者正之其素得于深思者附著之間又發揮於言外以俟後世冀修己治人者寔有取于經而典謨訓誥誓命貢征歌範皆徴之行事而已矣録成未敢自信質之弱矦先生乃其報書云段段愜心言言破的真學者之指南越世之卓見也遂力付之梓以與古音圖賛並行余實踧踖何敢當長者之奨若是已而思之弱矦以尚書起家又素慎許可豈愛之而忘其醜乎夫弱矦先生所謂當世眀經君子也他日見先大人於地下將以此言進萬厯壬子十一月望日閩陳第題
